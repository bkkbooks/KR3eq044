body:
  text: 卷之中傷飲食大抵氣口脈緊盛者宜下尺脈絶者宜吐經曰氣口脈盛傷於食心胃滿而口無味口與氣口同口曰坤者口乃脾之候故胃傷而氣口緊盛夫傷有多少有輕重如氣口一盛得脈六至則傷於厥陰乃傷之輕也枳朮丸之類主之氣口二盛脈得七至則傷於少陰乃傷之重也雄黃聖餅子木香檳榔丸枳殼丸之類主之氣口三盛脈得八至九至則傷太陰填塞悶亂則心胃大痛備急丸神保丸消積丸之類主之兀兀欲吐不已俗呼食迷風是也經曰上部有脈下部無脈其人當吐不吐者死瓜蒂散主之如不能吐是無治也經曰其高者因而越之此之謂也或曰盛食填塞胸中痞亂兩寸脈當用事今反兩尺脈不見其理安在曰胸中有食是木鬱宜達故探吐之食者物也物者坤土也是足太陰之號也胸中者肺也為物所塞肺者手太陰金也金主殺伐與坤土俱在手上而旺於天金能剋木故肝木發生之氣伏於地下非木鬱而何吐去上焦陰土之物木得舒暢則鬱結去矣食塞於上脈絶於下若不明天地之道無由達此至理水火者陰陽之徵兆天地之別名也故獨陽不生獨陰不長天之用在於地下則萬物生長地之用在於天上則萬物收藏此乃天地交而萬物通也此天地相根之道也故陽火之根本於地下陰水之源本於天上故曰水出高源故人五臟主有形之物物者陰也陰者水也右三部脈主之偏見於寸口食塞於上是絶五臟之源源絶則水不下流兩尺脈之絶此其理也何疑之有然必視所傷之物冷熱隨證加減如傷冷物一分熱物二分則用寒藥二停熱藥一停隨時消息經云必先歲氣無伐天和此之謂也既有三陰可下之法亦必有三陰可補之法故曰內傷三陰可用溫劑若飲冷內傷雖云損胃未知色脈各在何經若面色青黑脈浮沉不一弦而弱者傷在厥陰若面色紅赤脈浮沉不一細而微者傷在少陰若面色黃潔脈浮沉不一緩而遲者傷在太陰也傷在厥陰肝之經當歸四逆湯加吳茱萸生薑湯之類主之傷在少陰腎之經通脈四逆湯主之傷在太陰脾之經理中丸湯主之大便軟者宜湯結者宜丸凡諸脾脈微洪傷苦澀物經曰咸勝苦微弦傷冷硬物經云溫以克之微澀傷辛辣物經云苦勝辛微滑傷腥咸物經云甘勝咸弦緊傷酸硬物經云辛勝酸洪緩傷甜爛物經云酸勝甘微遲傷冷痰積聚惡物溫胃化痰單伏主物不消化曲糵三稜廣朮之類浮洪而數皆中酒葛根陳皮茯苓傷食作瀉不止於應服藥中加肉豆蔻益智仁以收固之按酒之為物氣熱而質濕飲之而昏醉狂易者熱也宜以汗去之既酲則熱去而濕留止宜利小便而已二者宜酌而用之大抵葛花解醒湯備矣飲食過多脹痞不下尋常率以破氣之藥投之是食物既傷於前藥劑又攻之於後脾氣安得而健暢也須以平補之藥為主佐以他藥一升一降使脾腎交通而水火既濟自然腐化矣中寒中寒之證身體強直口噤不語或四肢戰掉或灑灑惡寒或翕翕發熱或卒然眩暈身無汗者此寒毒所中也其異於傷寒何也曰傷寒發熱而中寒不發熱也仲景於傷寒詳之而中寒不成熱者未之及何也曰陽動陰靜動則變生靜則不變寒雖陰邪既鬱而成熱遂從乎陽動傳變不一靡有定方故極推其所主之病不得不詳也其不成熱者則是邪中於陰形之中一定而移不移則不變不變則止在所中寒處而生病是故略而不必詳也治之先用酒調蘇合香丸輕則五積散加香附一錢麝香少許重則用姜附湯若人漸蘇身體回暖稍能言語須更問其別有何證寒脈遲緊挾氣帶洪攻刺作痛附子理中湯加木香半錢挾風帶浮眩暈不仁加防風一錢挾濕帶濡腫滿疼痛加白朮一錢筋脈牽急加木瓜一錢肢節疼痛加桂一錢亦可灸丹田穴以多為妙大抵中在皮膚則為浮中在肉則為苛為重為聚液分裂而痛或痛在四肢或痛在胸脅或痛在脛背或痛在小腹引睪或經脈引注臟腑之膜原為心腹痛或注連於臟腑則痛死不知人中於筋骨為筋攣骨痛屈伸不利中入六腑五臟則仲景述在金匱要略中所以肺中寒者吐濁涕肝中寒者兩臂不能舉舌本燥喜太息胸中痛而不得轉側則吐而汗出也心中寒者其人苦心中如啖蒜狀劇者心痛徹背背痛徹心如蟲注其脈浮者自吐乃愈不言脾腎二臟中寒者缺文也然所謂中臟者乃中五臟所居畔界之郭內阻隔其經臟氣不得出入故病真中臟則死矣傷暑傷暑與熱病外證相似但熱病脈盛中暑脈虛以此別之又有濕溫與中暑同但身涼不渴為異耳此事難知傷暑有二動而傷暑心火大盛肺氣全虧故身脈洪大動而火勝者熱傷氣也辛苦人多得之白虎加人參湯靜而傷暑火勝金位肺氣出表故惡寒脈沉疾靜而濕盛者身體重也安樂之人多受之白虎加蒼朮湯暑先入心者心屬南方離火各從其類小腸為心之府利心經暑毒使由小腸中出五苓散利小便為治暑上劑也傷暑而大汗不止甚真元耗散宜急收其汗生料五苓散倍桂加黃耆如術之數六七月之間濕令大行子能令母實而熱旺濕熱相合而刑庚大腸故用寒涼以救之燥金受濕熱之邪絶寒水生化之源源絶則腎虧痿厥之病大作腰以下痿軟癱瘓不能動矣步行不正兩足欹側以清燥湯主之傷濕濕有天之濕霧露雨是也天本乎氣故先中表之榮衛有地之濕水泥是也地本乎形故先傷皮肉筋骨血脈有飲食之濕酒水乳酪之類是也胃為水穀之海故傷於脾胃有汗液之濕汗液亦氣也止感於外有人氣之濕太陰濕土之所化也乃動於中治天之濕當同司天法濕上甚而熱者平以苦溫佐以甘辛以汗為效而止如金匱要略諸條謂風濕相搏身上疼痛者是也治地之濕當同在泉法濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之治飲食之濕在中奪之在上吐之在下引而竭之汗液之濕同司天者治雖人氣屬太陰脾土所化之濕者在氣交之分也與前四治有同有異何者土兼四氣寒熱溫涼升降浮沉備在其中脾胃者陰陽異位更實更虛更逆更從是故陽盛則木勝合為風濕至陽盛則火勝合為濕熱陰盛則金勝合為燥濕至陰盛則水勝合為陰濕為兼四氣故淫泆上下中外無處不到大率在上則病嘔吐頭重胸滿在外則身重腫在下則足脛跗腫在中腹脹中滿痞塞當分上下中外而治隨其所兼寒熱溫涼以為佐使至若因乘克以致脾虛津積而成濕者則先治勝克之邪或脾胃本自虛而生濕者則用補虛為主或鬱熱而成濕者則以發熱為要或脾胃之濕淫泆流於四臟筋骨皮肉血脈之間者大概濕主乎否塞以致所受之臟澀不得通疏本臟之病因而發焉其筋骨皮肉血脈受之則發為痿痹緩弱痛重不任為用所治之藥各有所入能入於此者不能入於彼且濕淫為病內經所論疊出於各篇本草治濕亦不一而見凡切於治功者便是要藥今丹溪書乃止歸重蒼朮一味豈理也哉傷勞倦蓋人受水穀之氣以生所謂清氣營氣運氣衛氣春升之氣皆胃氣之別名也夫胃氣為水穀之海飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也若陰陽失節寒溫不適脾胃乃傷喜怒憂恐損耗元氣脾胃氣衰元氣不足而心火獨盛心火者陰火也起於下焦其繫系於心心不主令相火代之相火包絡之火元氣之賊也火與元氣不兩立一勝則一負脾胃氣虛則下流肝腎陰火得以乘其土位故脾證始得則氣高而喘身熱而煩其脈洪大而頭痛或渴不止其皮膚不任風寒而生寒熱蓋陰火上衝則氣高喘而煩熱為頭痛為渴而脈洪脾胃之氣下流使穀氣不得升浮是春生之令不行則無陽以護其榮衛使不任風寒乃生寒熱此皆脾胃之氣不足所致也然與外感風寒之證頗同而實異內傷脾胃乃傷其氣外感風寒乃傷其形傷其外則有餘有餘者瀉之傷其內則不足不足者補之汗之下之吐之克之之類皆瀉也溫之和之調之養之之類皆補也內傷不足之病苟誤認作外感有餘之證而反瀉之則虛其虛也實實虛虛如此死者醫殺之耳然則奈何為當以辛甘溫劑補其中而升其陽甘寒以瀉其火則愈矣經曰勞者溫之損者溫之又曰溫能除大熱大忌苦寒之藥損其脾胃今立補中益氣湯主之大抵治飲食勞倦所得之病乃虛勞七損證也當用溫平甘多辛少之藥治之是其本法也如時上見寒熱病四時也又或將理不如法或酒食過多或辛熱之食作病或寒冷之食作病或居大熱大寒之處益其病當臨時制宜暫用大寒大熱治法而取效此從權也不可以得效之故而久用之必致夭橫矣泄瀉丹溪云有濕有氣虛火痰食積戴復庵云瀉水腹不痛者濕也飲食入胃輒後之完穀不化者氣虛也腹痛瀉水腸鳴痛一陳瀉一陳者火也或瀉或不瀉或多或少者痰也腹痛甚而瀉瀉後痛減者食積也理中湯治泄瀉加橘紅茯苓各一兩名補中湯若溏泄不已者於補中湯內加附子一兩不喜飲食水穀不化者再加砂仁一兩共成八味濕瀉脈濡細乃太陰經脾土受濕泄水虛滑身重微滿不知穀味口不渴久雨泉溢河溢或運氣濕土司令之時多有此疾宜除濕湯吞戊己丸佐以胃苓湯重者朮附湯濕兼寒瀉內經曰濕勝則濡泄甲乙經云寒氣客於下焦傳為濡泄夫脾者五臟之至陰其性惡寒濕今寒濕之氣內容於脾故不能裨助胃氣腐熟水穀致清濁不分水入腸間虛莫能制故洞泄如水隨氣而下謂之濡泄法當除濕利小便也治之以對金飲子濕兼熱瀉益元散參萸丸寒瀉脈沉細或弦遲身冷口不渴小便清白或腹中綿綿作疼宜理中湯附子溫中湯漿水散暴泄如水周身汗出一身盡冷脈沉而弱氣少而不能語甚者加吐此謂緊病宜以漿水散治之戴云寒瀉寒氣在腹攻刺作痛洞下清水腹內雷鳴米飲不化者理中湯或附子補中湯吞大已寒丸或附子桂香丸畏食者八味丸元是冷瀉因瀉而煩躁引飲轉飲轉瀉者參附湯連理湯熱瀉脈數疾或洪大口乾燥身多動音聲響亮暴注下迫益元散加芩連燈心淡竹葉之屬泄而身熱小便不利口渴者益元五苓若火多四苓加木通黃芩戴云熱瀉糞色赤黃彈響作疼糞門焦痛糞出穀道猶如湯熱煩渴小便不利宜五苓散吞香連丸玉龍丸治一切伏暑泄瀉神效氣瀉腸鳴氣走胸膈痞悶腹急而痛瀉則腹下稍可須臾又急亦有腹急氣塞而不通者此由中脘停滯氣不流轉水穀不分所致戴法用大七香丸入米煎服久而不愈者五膈寬中散吞震靈丹仍佐以米飲調香附末氣虛瀉用四君子湯加曲糵升柴吞二神加木香丸傷食瀉因飲食過多脾胃之氣不足以運化而瀉其人必噫氣如敗卵臭宜治中湯加砂仁半錢曲糵枳朮丸或七香丸紅丸子雜服食積腹痛而瀉不可遽用治中兜住宜先用消導推蕩之藥或因食一物過傷而瀉後復食之即瀉者以脾為所傷未復而然宜大建脾湯寒者可用仍燒所傷之物存性為末三五錢重調服痰瀉二陳湯海石青黛黃芩神麯薑汁竹瀝為丸每服三五十丸少者必用吐法吐之方愈因傷於酒每晨起必瀉者宜理中湯加乾葛吞酒煮黃連丸或葛花解酲湯吞之有人每五更將天明時必溏利一次有人云此名腎泄服五味子散頓愈有人久泄早必泄一二行泄後便輕快脈滑而少弱先與厚朴和中丸五十丸大下之後以白朮為君枳殼半夏茯苓為臣厚朴炙甘草芩連川芎滑石為佐吳茱萸十餘粒為使生薑煎服十餘帖而愈二神丸合五味子散名為四神丸治瀉尤妙小便不利而泄若津液偏滲於大腸大便瀉而小便少者用胃苓散分利之若陰陽已分而小便短少此脾肺氣虛不能生水也宜補中益氣湯加麥門五味陰火上炎而小便赤少此肺氣受傷不能生水也用六味地黃丸加麥門五味腎經陰虛陽無所生而小便短少者用滋腎丸腎氣丸腎經陽虛陰無所化而小便短少者用益氣湯六味丸若誤用滲泄分利復傷陽氣陰無所生而小便益不利則腫脹之證作而疾危矣泄而口渴引飲此為津液內亡用錢氏白朮散或補中益氣湯腎水不足之人患泄或過服分利之劑而渴者加減八味丸失治必變小便不利水腫脹滿等危證矣趙以德云昔聞先生言泄瀉之病其類多端得於六淫五邪飲食所傷之外復有雜合之邪似難執法而治乃見先生治氣暴脫而虛頓瀉不知人口眼俱閉呼吸微甚殆欲絶者急灸氣海飲人參膏十餘斤而愈治陰虛而腎不能司禁固之權者峻補其腎治積痰在肺致其所合大腸之氣不固者湧出上焦之痰則肺氣下降而大腸之虛自復矣治憂思太過脾氣結而不能升舉陷入下焦而成泄瀉者開其鬱結補其脾胃使穀氣升發也凡此之類不可枚舉因問先生治病何其神也先生曰無他圓機活法具在內經熟之自得矣滑瀉東垣云中焦氣弱脾胃受寒冷大便滑泄腹中雷鳴或因誤下末傳寒中復遇時寒四肢厥逆心胃絞痛冷汗不止此腎之脾胃虛也沉香溫胃丸治之薛氏曰前證若脾胃虛寒下陷者用補中益氣湯加木香肉豆蔻補骨脂若脾氣虛寒不禁者用六君子湯加炮薑肉桂若命門火衰脾土虛寒者用八味丸若脾腎氣血俱虛者用十全大補湯送四神丸若大便滑利小便閉澀或肢體漸腫喘嗽唾痰為脾腎虧損宜金匱加減腎氣丸因傷面而瀉者養胃湯加萊蔔子炒研一錢痛者更加木香五分瀉甚者去藿香加炮姜如其數瀉已愈至明年此月日時復發者有積故也脾主信故至期復發熱積大承氣湯寒積感應丸虛者以保和丸加三稜蓬朮之屬投之脈細皮寒氣少泄利前後飲食不入此謂五虛不治若用參朮膏早救之亦有生者下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死下利手足厥冷無脈者灸之不溫若脈不還反微喘者死泄注脈緩時小結者生浮大數者死滯下即痢疾古以赤為熱白為冷至金河間李東垣始非之劉謂諸痢皆由乎熱而以赤屬之心火黃屬之脾土白屬之肺金青屬肝木黑乃熱之極而反兼腎水之化其諸瀉利皆兼於濕濕主於痞以致怫鬱氣不得宣通濕熱甚於腸胃之中因以成腸胃之燥故里急後重小便赤澀謂治諸痢莫若以辛苦寒藥而治或微加辛熱佐之辛能開鬱苦能燥濕寒能勝熱使氣宣平而已行血則便血自愈調氣則後重自除李從脾胃病者而論則曰上逆於肺為白下傳於陰為赤衛生寶鑑因謂太陰主瀉傳於少陰為痢由泄亡津液而火就燥腎惡燥居下焦血分也其受邪者故便膿血然亦赤黃為熱青白為寒丹溪謂滯下因火熱下迫而致裡急後重用劉氏之治濕熱李氏之保脾土更復一一較量氣血虛實以施治三家皆發前代之未發而舉其要也豫嘗因是而研究之自其五色分五臟者言則可見濕熱之中具有五邪之相挾自其上逆下傳氣血者言則可見五臟六腑十二經脈之氣血諸邪皆得傷之而為痢之赤白本自其濕熱為病者言則可見由來致成濕熱之故非一端自其分痢有虛實者言則可見凡在痢病者中所有之證如煩躁者咽乾舌黑者噦噫後重者腹痛者脹滿者腳痛腫弱之類悉有虛實之殊是故豫於痢證直斷之種種為邪入胃以成濕熱經臟受傷其氣傷則病於肺血傷則傳於心心肺者氣血之主也氣血所行之方既病安得不歸所主之臟乎而大小腸者心肺之合也出納水穀糟粕傳輸之官胃乃大小腸之總司又是五臟六腑十二經脈稟氣之海苟有內外之邪凡損傷於經臟者或移其邪入胃胃屬土濕之化胃受邪則濕氣不化怫鬱而成濕熱矣或心肺移氣血之病傳之於合大腸獨受其病則氣凝注而成白痢小腸獨受其病則血凝注而成赤痢大小腸通受其病則赤白相混而下胃之濕熱淫於大小腸者亦如之其色兼黃若色之黑者有二如色之焦黑此極熱兼水化之黑也如黑之光若漆者此瘀血也或曰治利以腸胃世人所守之法也今乃復求其初感之邪與初受之經將何為哉曰病在腸胃者是其標也所感之邪與初受之經者是其本也且內經於治標本各有所宜施之先後況所傳變之法又與傷寒表裡無異何可不求之乎豈止此而已至若腸胃自感而病亦當以邪正分或正氣先虛而受邪或因邪而致虛則以先者為本後者為標與夫積之新舊亦如之舊積者停食結痰所化之積也新積者舊積去後而氣血怫鬱所生者也舊積當先下之新積則不宜下其故何哉蓋腸胃之腐熟水穀轉輸糟粕者皆榮衛灑陳六腑之功今腸胃有邪則榮衛運行至此其機為之阻不能施化故衛氣鬱而不舒榮血泣而不行於是飲食結痰停於胃糟粕留於腸與所鬱氣泣血之積相挾成滯下病矣如是者必當下之以通壅塞利榮衛之行至於升降仍不行衛氣復郁榮血復泣又成新積故病如初若是者不必求邪以治但理衛氣以開通腠理和榮血以調順陰陽陰陽調腠理開則升降之道行其積不治而自消矣然而舊積亦有不可下者先因榮衛之虛不能轉輸其食積必當先補榮衛資腸胃之真氣充溢然後下之庶無失矣豫數見俗方惟守十數方治利不過攻之澀之而已矣安知攻病之藥皆是耗氣損血之劑用之不已甚至於氣散血亡五臟空虛精憊神去而死其固澀之又皆足以增其氣鬱血泣之病轉生腹脹下為足腫上為喘呼諸疾作焉世人之法何足守乎玄珠云下痢赤白腹滿脹痛裡急上渴引飲小水赤澀此積滯也宜泄其熱中用清腸丸導氣丸推其積滯而利自止矣凡治積聚之證輕則溫而利之清腸丸是也重者天真散舟車丸下之下後勿便補之其或力倦自覺氣少惡食此為挾虛證宜加白朮當歸身尾甚者加人參若又十分重者止用此藥加陳皮補之虛回而痢自止矣大便不通金匱真言論云北方黑色入通於腎開竅於二陰故腎陰虛則小大便難宜以地黃蓯蓉車前茯苓之屬補真陰利水道少佐辛藥開腠理致津液而潤其燥施之於老人尤宜若大小便燥結之甚求通不得登廁用力太過便仍不通而氣被掙脫下注肛門有時泄出清水而裡急後重不可忍者胸膈間梗梗作惡乾嘔有聲渴而索水飲食不進呻吟不絶欲利之則氣已下脫命在須臾再下即絶欲固之則溺與燥矢膨滿腹腸間恐反增劇欲升之使氣自舉而穢物不為氣所結自然通利則嘔惡不堪宜如何處家姑年八十餘嘗得此患豫惟用調氣利小便之藥雖小獲效不收全功嘗慰之令勿急性後因不能食遽索末藥利下數行不以告豫自謂稍快矣而脈忽數動一止氣息奄奄頽然床褥豫知真氣已泄若不收攝恐遂無救急以生脈藥投之數劑後結脈始退因合益血潤腸丸與服勸以勿求速效勿服他藥久之自有奇功如言調理兩月餘而二便通調四肢康勝矣便祕自是老人常事俗以為後門固壽考之徵而一時難堪輒躁擾而致疾豫所處方不犯大黃可以久服故表而出之益血潤腸丸熟地黃六兩杏仁炒去皮尖麻仁各三兩以上三味俱杵膏枳殼麩炒橘紅各二兩五錢阿膠炒肉蓯蓉各一兩半蘇子荊芥各一兩當歸三兩末之以前三味膏同杵千餘下仍加煉蜜丸如桐子大每服五六十丸空心白湯下大法云大便祕服神芎丸大便不通小便反利不知燥濕之過本大腸少津液以寒燥之藥治之是以轉燥少服則不濟多服則亡血所以不通若用四物麻子杏仁之類則可經云燥則為枯濕劑所以潤之小便不通或問以吐法通小便方論中未嘗有之理將安在曰取其氣化而已何則內經謂三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣故上中下三焦之氣有一不化則不得如決瀆之水而出矣豈獨下焦膀胱氣塞而已哉上焦肺者主行榮衛通調水道下輸膀胱而腎之合足三焦下輸又上連肺此豈非小便從上焦之氣化者乎張仲景有言衛氣行則小便宣通其義亦在是矣內經又謂脾病則九竅不通小便不利是其一也此豈非小便從中焦之氣化者乎由是而言之三焦所傷之邪不一氣之變化無窮故當隨處治邪行水求其氣化亦無窮也然而大要在乎陰陽無相偏負然後氣得以化若方盛衰論曰至陰虛天氣絶至陽盛地氣不足夫腎肝在下地道也心肺在上天道也脾胃居中氣交之分也故天之陽絶而不交於地者尚且白露不下況人同乎天其在上之陽不交於陰則在下之陰無以為化而水道其能出乎東垣引八十一難經謂有陰陽相乘有覆有溢而為內關不得小便者有或在下之陰虛在上之陽盛不務其德而乘之致腎氣之不化者必瀉其陽而舉之則陰可得而平也若此條所敘之證皆用吐法蓋因氣道閉塞升降不前者而用耳何嘗舍衆法而獨施是哉丹溪嘗曰吾以吐法通小便譬如滴水之器上竅閉則下竅無以自通必上竅開而下竅之水出焉豫嘗推是開竅之法用之多驗姑書一二證以明之甲午秋治一婦人年五十初患小便澀醫以八正散等劑展轉小便不通身如芒刺加於體豫以所感霖淫雨濕邪尚在表因用蒼朮為君附子佐之發其表一服即汗小便即時便通又治馬參政父年八旬初患小便短澀因服藥分利太過遂致閉塞涓滴不出豫以飲食太過傷其胃氣陷於下焦用補中益氣湯一服小便通因先多利藥損其腎氣遂致通後遺尿一夜不止急補其腎然後已凡醫之治是證未有不用泄利之劑者安能顧其腎氣之虛哉表而出之以為世戒大抵小腹痛脹如覆碗者為實亦分在氣在血氣壅塞於下者木香流氣飲血汙於下者桃仁煎代抵當丸牛膝膏淋小便淋莖中痛不可忍相引脅下痛宜參苓琥珀湯有小便難澀如淋不痛而癢者虛證也宜八味丸生料鹿茸丸之類若因思慮過度致淋宜歸脾湯或辰砂妙香散吞威喜丸或妙香散和五苓散石首魚腦骨十個火煅滑石二錢琥珀三分俱為細末每服一錢空心煎木通湯調下遺精丹溪書分夢遺精滑為二門蓋夢與鬼交為夢遺不因夢感而自遺者為精滑然總之為遺精也其治法無二故合之葉氏云遺滑之證豫纍見人多作腎虛而用補澀之藥無效殊不知此因脾胃濕熱所乘飲酒厚味痰火之人多有此疾腎雖藏精其精本於脾胃飲食生化而輸於腎若脾胃受傷濕熱內郁使中氣淆而不清則所輸皆濁氣邪火擾動水不得而安靜故遺滑也治以蒼白二陳湯加黃檗升麻柴胡俾清氣升濁氣降而脾胃健運則遺滑自止矣其有欲心太熾思想無窮而致者當從心治心清則神寧而火不妄起宜遠志丸茯神湯房勞無度致腎虛者必兼見怯弱等證方可用補腎藥故治有多端須當審察不可偏作腎虛治也趙以德治鄭叔魯二十餘歲攻舉子業讀書夜至四鼓猶未已遂發此病臥間玉莖但著被與腿便夢交接脫精懸空則不夢飲食日減倦怠少氣此用心太過二火俱起夜不得睡血不歸肝腎水不足火乘陰虛入客下焦鼓其精房則精不得聚藏而欲走因玉莖著物猶厥氣客之故作接內之夢於是上補心安神中調脾胃升舉其陽下用益精生陰固陽之劑不三月而病安矣醫家大法曰嘗治脫真不止者以澀劑收止之則不能收不能止不若瀉心火若瀉心火不能止之不若用升陽之劑加風藥之類止之非此能止之也舉其氣上而不下也赤白濁溺與精所出之道不同淋病在溺道故綱目列之肝膽部濁病在精道故綱目列之腎膀胱部今患濁者雖便時莖中如刀割火灼而溺自清唯竅端時有穢物如瘡膿目眵淋漓不斷初與便溺不相混濫猶河中之濟焉至易辨也每見時醫以淋法治之五苓八正雜投不已而增劇者不可勝數豫每正之而其餘尚難以戶說也蓋由精敗而腐者什九由濕熱流注與虛者什一疝男子婦女疝氣臍下冷痛相引腰胯而痛宜當歸四逆湯丹溪治內郁之濕熱煎方枳實九粒炒桃仁十四個炒山梔仁九個炒吳茱萸七粒炒山楂四粒炒生薑如指大上六味同入擂盆擂細取順流水一鍾入瓶內煎至微沸帶渣服如濕勝㿗疝者加荔枝核如痛甚者加鹽炒大茴香二錢如痛處可按者加薄桂少許丸方山梔二兩炒山楂四兩炒枳實炒茴香炒各二兩柴胡牡丹皮八角茴香各一兩炒桃仁茱萸炒各半兩末之酒糊丸空心鹽湯下五六十丸陽明受濕熱傳入大腸發熱惡寒小腹連毛際間悶痛不可忍用梔子仁炒桃仁炒枳實炒山楂各等分同研細入生薑汁半合用水一小鐘燙起煎令沸熱服之一方加茱萸丹溪云疝有挾虛而發者其脈不甚沉緊而大豁無力者是也然其痛亦輕唯覺重墜牽引耳當以參術為君疏導藥佐之蓋疏導藥即桃仁山楂枳實梔仁茱萸川楝玄胡索丁香木香之類是也不問何證皆可用生料五積散每服一兩入鹽炒吳茱萸茴香各一錢生薑三片蔥白五寸煎空心熱服樓全善治謝人妻小腹疼痛小便不通先艾灸三陰交以茴香丁香青皮檳榔桂茱萸玄胡索山楂枳實又倍用黃檗煎服愈脫肛寒者以香附子荊芥等分煎湯洗之熱者以五倍子朴硝煎湯洗之亦用木賊燒灰不令煙盡入麝香少許大便了貼少許或以五倍子末攤紙上貼肛緩緩揉入大腸熱甚與腸風者涼血清腸散瀉痢後大腸氣虛肛門脫出不腫不痛屬氣血虛宜補氣血為主赤腫有痛宜涼血祛風為主補氣血八珍湯十全散涼血生地赤芍槐花槐角黃栝蔞雞冠花疏風防風羌活荊芥生鐵三斤水一斗煮取五升出鐵以汁洗內服磁石散痔薛新甫云初起焮痛便祕或小便不利者宜清熱涼血潤燥疏風若氣血虛而寒涼傷損者調養脾胃滋補陰精若破而久不愈多成痔漏有穿臀穿陰穿腸者宜養元氣補陰精為主大便祕澀或作痛者潤燥除濕肛門下墜或作痛者瀉火除濕墜腫痛或作癢者祛風勝濕腫痛小便澀滯者清肝導濕若有患痔而兼疝患疝而兼下疳皆屬肝腎不足之變症但用地黃丸益氣湯以滋化源為善若專服寒涼治火者無不致禍痞或問痞屬何臟邪屬何氣曰嘗考之內經有陽明之復心痛痞滿者注以清甚於內熱鬱於外太陽之復心胃生寒心痛痞悶者注以心氣內燔備化之紀病痞卑監之紀留滿痞塞太陰所至為積飲痞膈注皆以陰勝陽也由是觀之則是受病之臟者心與脾也因而怫鬱壅塞不通為痞者火與濕也其論致病所由之邪則不可一言而盡天氣之六淫外感人氣之五邪相乘陰陽之偏負飲食七情之過節皆足以亂其火土之氣蓋心陽火也主血脾陰土也主濕凡傷其陽則火怫鬱而血凝傷其陰則土壅塞而濕聚二臟之病相去不離方寸間至於陰陽之分施治之法便不可同也何則金匱要略水病篇謂心下堅大如盤邊如旋杯水飲所作者二條同是語也但一條之上有氣分二字用桂枝去芍藥加麻黃附子細辛湯治為水寒之邪閉結氣海之陽不布榮衛不行一條用枳朮湯為中焦水停土壅故也又胸痹篇云胸痹心下痞留氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之一證列二方原其意蓋是留氣結在胸為重者便須補中又心中痞諸逆心懸痛桂枝生薑枳實湯主之傷寒論中有謂病人手足厥冷脈作緊邪結在胸中者當吐之脈浮大心下反硬有熱屬臟者下之茲二者為不汗下而痞滿從其邪有高下故吐下之不同若經汗下而心下痞則以諸瀉心湯大抵痞與結胸同是滿硬但結胸則湧治豈非仲景治痞亦在心脾二臟從火土之陰陽者歟各適其宜而治高者越之下者竭之上氣不足推而揚之下氣不足溫而行之高者抑之下者舉之郁者開之結者解之寒者熱之熱者寒之虛則補實則瀉隨機應變以為治若酒積雜病下之大過亦作痞滿宜升提胃氣以血藥兼之脾胃弱而轉運不調為痞宜四君子湯傷於勞倦者補中益氣湯大病後元氣未復而痞者亦宜之脈之右關多弦弦而遲者必心下堅此肝木克脾上鬱結涎閉於臟腑氣不舒則痞木香順氣湯海藏云治痞獨益中州脾土以血藥治之其法無以加矣瘧豫弱冠遊鄉校時校師蔣先生之內患牝瘧身痛逾月不瘥困甚時豫初知醫延豫診治告以醫欲用薑附溫之豫曰溽暑未衰明系熱邪安得寒而溫之經云陽並於陰則陰實而陽虛陽明虛則寒栗鼓頷也醫陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒此所云寒乃陰陽交爭互作之寒非真寒也豈得用桂附溫之乃處一方以柴胡升麻葛根羌活防風補三陽之虛升之也何曰補曰虛亦非真虛以陷入陰分而謂之虛故升之即補矣以桃仁紅花引入陰分而取陽以出還於陽分以豬苓分隔之使不復下陷一劑而病良已外祖母虞太孺人年八十餘夏患瘧諸舅以年高不堪懼其再發議欲截之豫曰欲一劑而已亦甚易何必截乎乃用柴胡升麻葛根羌活防風之甘辛氣清以升陽氣使離於陰而寒自已以知母石膏黃芩之苦甘寒引陰氣下降使離於陽而熱自已以豬苓之淡滲分利陰陽使不得交併以穿山甲引之以甘草和之果一劑而止瘧發已多遍諸藥未效度無外邪及虛人患瘧者以人參生薑各一兩煎湯於發前二時或發日五更連進二服無不愈者愈後亦易康復不煩調將近因人參價高難用濟貧以白朮代之夜發則用當歸亦莫不應手而愈大法先熱後寒者小柴胡湯先寒後熱者小柴胡加桂枝湯多熱但熱者白虎加桂枝湯多寒但寒者柴胡桂薑湯此以瘧之寒熱多少定治法也若多寒而但有寒者其脈或洪實或滑當作實熱治之若便用桂枝誤也如或多熱而但有熱者其脈或空虛或微弱當作虛寒治之若便用白虎亦誤也所以欲學者必先問其寒熱多少又診脈以參之百無一失矣仲景云瘧脈自弦弦數者多熱弦遲者多寒弦小緊者可下之弦遲者可溫之弦緊者可發汗及針灸也浮大者可吐之弦數者風疾發也飲食消息止之凡寒熱發作有期者瘧也無期者諸病也仲景易老治瘧法晰矣然用之外因暑邪病在盛熱之時為宜若深秋悽清之候與七情痰食諸傷未可泥也嘔吐金匱方諸嘔吐谷不得下者小半夏湯主之又云嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之用半夏一升生薑半斤水七升煮取一升半分溫再服又云卒嘔吐心下痞有水眩悸者小半夏加茯苓湯主之即前方加茯苓四兩也然則生薑半夏固通治嘔吐之正劑矣然東垣云辛藥生薑之類治嘔吐但治上焦氣壅表實之病若胃虛穀氣不行胸中閉塞而嘔者唯宜益胃推揚穀氣而已勿作表實用辛藥瀉之故服小半夏湯不愈者服大半夏湯立愈此仲景心法也寒而嘔吐則喜熱惡寒四肢悽清或先覺咽酸脈弱小而滑因胃虛傷寒飲食或傷寒汗下過多胃中虛冷所致當以剛壯溫之宜二陳湯加丁香十粒或理中湯加枳實半錢或丁香吳茱萸湯藿香安胃散鐵刷湯不效則溫中湯甚則附子理中湯或治中湯加丁香並須冷服蓋冷遇冷則相入庶不吐出羅謙甫云諸藥不愈者紅豆丸神效曾有患人用附子理中湯四逆湯加丁香到口即吐後去乾薑只參附加丁木二香煎熟更磨入沉香立吐定蓋虛寒痰氣凝結丁附既溫佐以沉木香則通乾薑白朮則泥耳熱嘔食少則出喜冷惡熱煩躁引飲脈數而洪宜二陳湯加黃連炒梔子枇杷葉竹茹乾葛生薑入蘆根汁服金匱方嘔而發熱者小柴胡湯主之金匱方心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食茯苓飲主之能消痰氣令能食又云渴欲飲水水入則吐者名曰水逆五苓散主之仲景以吐蛔為胃中冷之故則成蛔厥宜理中湯加炒川椒五粒檳榔半錢吞烏梅丸胃反即膈噎瘀血在膈間阻礙氣道而成者居多以代抵當丸作芥子大取三錢去枕仰臥細細咽之令其搜逐停積至天明利下惡物卻好將息自愈治反胃用新汲水一大碗留半碗將半碗水內細細澆香油鋪滿水面上然後將益元散一帖輕輕鋪滿香油麵上須臾自然沉水底此即陰陽升降之道也用匙攪勻服卻將所留水半碗燙藥碗漱口令淨吐既止卻進末子涼膈散通其大小便未效再進一帖益元及涼膈即效也此方極驗童便降火竹瀝行痰韭汁行血人乳汁牛乳汁補虛潤燥蘆根汁止嘔茅根汁涼血薑汁佐竹瀝行痰甘蔗汁和胃驢尿殺蟲仍入燒酒米醋蜜各少許和勻隔湯燉溫服自制通腸丸大黃酒浸滑石飛研各二兩陳皮去白厚朴薑製各一兩半人參當歸貫衆去毛乾漆炒煙盡各一兩木香檳榔各七錢半三稜煨蓬朮煨川芎薄荷玄明粉雄黃桃仁泥甘草各五錢俱各另取細末用竹瀝童便韭汁人乳驢尿蘆根汁茅根汁甘蔗汁燒酒米醋蜜各二杯薑汁一杯隔湯煮濃和丸如芥子大每服三錢去枕仰臥唾津咽下通利止後服服此丸及前諸汁後得藥不反切不可便與粥飯及諸飲食每日用人參五錢陳皮二錢作湯細啜以扶胃氣覺稍安漸漸加人參旬日半月間方可小試陳倉米飲及糜粥倉廩未固不宜便貯米穀常見即食粥飯者遂致不救李絳療反胃嘔吐無常粥飲入口即吐困倦無力垂死者以上黨人參三大兩劈破水一大升煮取四合熱頓服服耗氣藥過多中氣不運而致者當補氣而使自運補氣運脾湯或痰飲阻滯而脈結澀者二陳湯入竹瀝薑汁有因火逆衝上食不得入其脈洪大有力而數者滋陰清膈散加枇杷葉二錢蘆根一兩痰多食飲才下便為痰涎裹住不得下者以來復丹控其痰涎自制滌痰丸半夏曲枯礬皂角火炙刮去皮弦子玄明粉白茯苓枳殼各等分霞天膏和丸有因脾胃陽火內衰其脈沉微而遲者以辛香之藥溫其氣卻宜丁沉透膈湯五膈寬中散嘉禾散之類仍以益陰之藥佐之診沉緩而無力或大而弱為氣虛數而無力或澀小為血虛數而有力為熱寸關沉或伏或大而滑數是痰寸關脈沉而澀是氣年高病人元氣敗壞手足寒冷糞如羊矢沫大出者皆不治霍亂或間霍亂病亦復有他論者乎曰嘗考之內經有太陰所至為中滿霍亂吐下有土鬱之發民病嘔吐霍亂注下上濕土霍亂即仲景五苓散理中丸之類有歲土不及風乃大行民病霍亂飧泄上土虛風勝霍亂即羅謙甫桂苓白朮散之類有熱至則身熱霍亂吐下上熱霍亂即活人書香藿散之類靈樞有足太陰之別名曰公孫去本節後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則蠱脹取之所別有清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於腸胃則為霍亂取之足太陰陽明不下取之三里巢氏因此一條乃云霍亂者由陰陽清濁二氣相干亂於腸胃間因遇飲食而變發則心腹絞痛挾風而實者自發熱頭痛體疼虛者但心腹痛而已亦有因飲酒食肉腥膾生冷過度居處不節或露臥濕地或當風取涼風冷之氣歸於三焦傳於脾胃水穀不化皆成霍亂自巢氏之說行後世守之以為法無復知內經諸條者矣至劉河間乃云吐下霍亂三焦為水穀傳化之道路熱氣甚則傳化失常而吐瀉霍亂炎性躁動故也世俗止謂是停食者誤也轉筋者亦是脾胃土衰肝木自甚熱氣燥爍於筋則筋攣而痛亦非寒也張戴人則以風濕暍三氣合而為邪蓋脾胃濕土為風木所克鬱則熱乃發發則心火炎上故嘔吐嘔吐者暍也脾濕下注故注泄注泄者濕也風急甚故筋轉轉筋者風也可謂善推病情者乎王海藏亦謂風濕熱外至生冷物內加內外合病者此條殆似之矣凡治病當從內經隨宜施治安可執一端而已哉然則此病當以何為要曰脾胃之濕為本諸邪感動者為病之由然其間脾胃為虛有實邪有陰陽相干之孰甚皆宜消息處治至若明理論謂傷寒吐利者由邪氣所傷霍亂吐利者由飲食所傷其有兼傷寒之邪內外不和者加之頭痛發熱而吐利者是霍亂傷寒也原仲景之意豈必在飲食始為是病彼於寒邪傳入中焦胃氣因之不和陰陽否隔者安得不有以致之乎不然何以用理中四逆等湯治之保命集云凡霍亂慎勿與粟米粥湯入胃即死如吐瀉已多欲住之後宜以稀粥漸漸補養以遲為妙霍亂並諸吐瀉後胸膈高起痞塞欲絶理中湯加枳實半錢茯苓半錢若枳實理中湯吐瀉已愈而力怯精神未復者十補散診霍亂遍身轉筋肚痛四肢厥冷欲絶者其脈洪大易治脈微囊縮舌卷不治霍亂之後陽氣已脫或遺尿而不知或氣少而不語或膏汗如珠或大躁欲入水或四肢不收皆不可治也乾霍亂忽然心腹脹滿攪痛欲吐不吐欲瀉不瀉燥亂憒憒無奈俗名攪腸沙者是也丹溪云吐提其氣最是良法吐中兼有發散之義有用解散者不用涼藥但二陳湯加川芎蒼朮防風白芷厄逆厄逆即內經所謂噦也或曰成無己許學士固以噦為厄逆然東垣海藏又以噦為乾嘔陳無擇又以噦名咳逆諸論不同今子獨取成許二家之說何也曰噦義具在內經顧諸家不察耳按靈樞雜病篇末云噦以草刺鼻噴嚏而已無息而疾迎引之立已大驚之亦可已詳此經文三法正乃治厄逆之法按厄逆用紙捻刺鼻便嚏嚏則厄逆立止或閉口鼻氣使之無息亦立已或作冤盜賊大驚駭之亦已此豫所以取成許二家之論噦為厄逆為得經旨也若以噦為乾嘔設使乾嘔之人或使之嚏或使之無息或使之大驚其乾嘔能立已乎噦非乾嘔也明矣若以噦名咳逆按內經生氣通天論曰秋傷於濕上逆而咳陰陽應象論曰秋傷於濕冬生咳嗽以此論之則咳逆為咳嗽無疑以春夏冬三時比例自見孫真人千金曰咳逆者嗽也本自明白後人不知何以將咳逆誤作厄逆失之遠矣劉宗厚曰厄逆一證有虛有實有火有痰有水氣不可專作寒論蓋傷寒發汗吐下之後與瀉利日久及大病後婦人産後有此者脾胃氣血大虛之故也若平人食入太速而氣噎或飲水喜笑錯喉而氣搶或因痰水停隔心中或因暴怒氣逆痰厥或傷寒病失下而有此者則皆屬實也夫水性潤下火性炎上今其氣自下衝上非火而何大抵治法虛則補之虛中須分寒熱如因汗吐下後誤服寒涼過多當以溫補之如脾胃陰虛火逆上衝當以平補之挾熱者涼而補之若夫實者如傷寒失下地道不通因而厄逆當以寒下之如痰飲停蓄或暴怒氣逆痰厥此等必形氣俱實別無惡候皆隨其邪之所在湧之泄之清之利之也治厄逆於臍下關元灸七壯立愈纍驗又方男左女右乳下黑盡處一韭葉許灸三壯甚者二七壯面痛面痛皆屬火蓋諸陽之會皆在於面而火陽類也心者生之本神之變其華在面而心君火也暴痛多實久痛多虛高者抑之郁者開之血熱者涼血氣虛者補氣不可專以苦寒瀉火為事老母年七十餘纍歲患頰車痛每多言傷氣不寐傷神則大發發之劇則上連頭下至喉內及牙齦皆如針刺火灼不可手觸乃至口不得開言語飲食並廢自覺火光如閃電尋常涎唾稠黏如絲不斷每勞與餓則甚得臥與食則稍安知其虛也始以清胃散犀角升麻湯人參白虎湯羌活勝濕湯加黃芩甘桔皆不效後改用參耆白朮芎歸升柴甘桔之類稍佐以芩梔連翹黍黏空腹進之而食遠則加服加減甘露飲始漸安第老人性躁不耐閒勞與多言時有之不能除去病根然發亦稀少即發亦不如往歲之劇矣從子鋙因喪子鬱結復多餌鹿角膠諸種子藥或於食後臨臥輒進之以至積成胃熱遂患面痛如老母證服清胃散甘露飲大加石膏過當而見虛證又服參耆等補藥過當而復見火證門人施生以越鞠加山梔連翹貝母橘紅之屬開其鬱結而始向安腳氣腳氣之名起自後代其頑麻腫痛者則經所謂痹厥也痿軟不收者則經所謂痿厥也其衝心者則經所謂厥逆也凡腳氣之候或見食嘔吐憎聞食臭或有腹痛下利或大小便閉澀不通或胸中衝悸不欲見光明或精神昏憒或喜迷忘語言錯亂或壯熱頭痛或身體極冷疼煩或覺轉筋或腫或不腫或䏶腿頑痹或時緩縱不隨或復百節攣急或小腹不仁引皆腳氣狀貌也方書以腫者為濕腳氣不腫者為乾腳氣不問久近乾溼及屬何經並可用除濕湯加木瓜檳榔白芷各半錢或芎芷香蘇散加赤芍藥萆薢各半錢仍吞木瓜丸腳氣衝心丹溪用四物湯加炒檗以附子末津調傅湧泉穴以艾灸泄引其熱下行金匱八味丸治腳氣上攻入少腹不仁已上虛者宜之檳榔為末童便調服三脘散大腹子散桑白皮散薏苡仁散已上實者宜之腳氣上氣喘息紫蘇葉三兩桑白皮銼炒二兩前胡去蘆一兩㕮咀每服八錢水二盞半檳榔二枚杏仁去皮尖二十枚生薑五片煎至一盞溫服無時腳氣喘急此係入腹宜蘇子降氣湯仍佐以養正丹或四磨飲腳氣嘔逆噁心宜八味平胃散加木瓜一錢胃食者宜生料平胃散加木瓜一錢二證並可用半夏散橘皮湯小便不通用生料五苓散一帖除濕湯一帖加木瓜二錢重分二服大便不通羌活導滯湯大小便俱不通檳榔丸或五苓散和復元通氣散發熱不退者敗毒散加木瓜一錢或用敗毒散五積散各半帖和勻名交加散更加木瓜一錢若久履濕而得兩腳或腫或瘡五苓散或和氣飲加木瓜蘿蔔子各半錢大黃一錢腳氣日久腳脛枯細或寒或熱或疼或癢或一腳偏患軟弱嚲曳狀如偏風者宜小續命湯加木瓜或獨活寄生湯附子八味湯吞活絡丹虎骨四斤丸腳心痛者宜大聖散二錢重入木瓜末一錢豆淋酒調仍用川椒香白芷草烏煎湯洗腳氣隱痛行步艱辛用平胃散加赤曲同煎服最妙雞鳴散亦佳診脈浮弦為虛濡細為濕洪數為熱遲澀為寒微滑為虛牢堅為實浮為表沉為里沉弦為風沉緊為寒沉細為濕沉數為熱結因氣散因憂緊因怒細因悲入心則恍惚謬妄嘔吐食不入眠不安脈左寸乍大乍小乍無者不治入腎則腰腳皆腫小便不通呻吟口額黑沖胸而喘左尺絶者不治但見心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者死著痹即麻木原病式列麻證在六氣燥金諸澀條下釋之曰物得濕則滑澤干則澀滯麻猶澀也由水液聚少而燥澀氣行壅滯而不得滑澤通行氣強攻衝而為麻也俗方治麻病多用烏附者令氣行之暴甚以故轉麻因之衝開道路以得通利而麻愈也然六氣不必一氣獨為病氣有相兼若亡液為燥或麻木無熱證即當此法或風熱勝濕為燥因而病麻則宜以退風散熱活血養液潤燥通氣之涼藥調之東垣則曰麻者氣之虛也真氣虛弱不能流通填塞經絡四肢俱虛故生麻木不仁或在手或在足或通身皮膚盡麻者皆以黃耆人參白朮甘草五味芍藥當歸升麻柴胡之類隨時令所兼之氣出入為方但補其虛全不用攻衝之劑竊詳劉李二公生同時居同地無世運方土之異宜何乃凡病遽有補攻之別如此蓋因悟入聖人之道不同劉以人稟天賦本無虧缺因邪入攪亂其氣而後成病所以攻邪為要邪退則正氣自安李以人之真氣榮養百骸周於性命凡真氣失調少有所虧則五邪六淫便得乘間而入所以補正為要正復則邪氣自卻今宜酌量二公之法當攻當補從中調治無執泥其說渾身麻木不仁或左或右半身麻木或面或頭或手臂或腳腿麻木不仁並神效黃耆湯丹溪曰手麻是氣虛木是濕痰死血十指麻木胃中有濕痰死血氣虛者補中益氣湯或四君子湯加黃耆天麻麥門冬川歸濕痰者二陳湯加蒼白朮少佐附子行經死血者四物湯加桃仁紅花韭汁大理少卿韓珠泉遍身麻痹不能舉動求治於豫豫以神效黃耆湯方加減授之用耆一兩二錢參芍各六錢他稱是一服減半彼欲速效遂並二劑為一服之旬日而病如失矣豫以元氣初復宜靜以養之完固而後可出渠不能從盛夏遽出見朝謁客勞頓纍日偶從朝房出上馬忽欲墜僕從者扶至陳虛舟比部寓邀豫視之豫辭不治數日而歿嗚呼行百里者半於九十可不戒哉
