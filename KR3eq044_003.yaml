body:
  text: 卷之下諸見血證攖寧生卮言云古人言諸見血非寒證皆以血為熱迫遂至妄行然皆復有所挾也或挾風或挾濕或挾氣又有因藥石而發者其本皆熱上中下治各有所宜在上則梔子黃芩黃連芍藥犀角蒲黃而濟以生地黃牡丹皮之類胃血古人有胃風湯正是以陽明火邪為風所扇而血為之動中間有桂取其能伐木也若蒼朮地榆白芍藥之類而濟以火劑大腸血以手陽明火邪為風為濕也治以火劑風劑風能勝濕也如黃連黃芩芍藥檗皮荊芥防風羌活之類兼用雞冠花則又述類之義也血溢血泄諸蓄妄證其始也予率以桃仁大黃行血破瘀之劑折其銳氣而後區別治之雖往往獲中然猶不得其所以然也後來四明遇故人蘇伊舉間論諸家術伊舉曰吾鄉有善醫者每治失血蓄妄必先以快藥下之或問失血復下虛何以當則曰血既妄行迷失故道不去蓄利瘀則以妄為常曷以御之且去者自去生者自生何虛之有予聞之愕然曰名言也昔者之疑今釋然矣婦人之於血也經水蓄而為胞胎則蓄者自蓄生者自生及其產育為惡露則去者自去生者自生其醞而為乳則無復下滿而為月矣失血為血家妄逆產婦為婦人常事其去其生則一也失血家須用下劑破血蓋施之於蓄妄之初亡血虛家不可下蓋戒之於亡失之後驚而動血者屬心怒而動血者屬肝憂而動血者屬肺思而動血者屬脾勞而動血者屬腎九靈山房集云湖心寺僧履師偶搔膕中疥自出血汩汩如湧泉竟日不止瘍醫治療不效邀呂元膺往視時已困極無氣可語及待其脈惟尺脈如蛛絲他部皆無即告之曰夫脈血氣之先也今血妄溢故榮氣暴衰然兩尺尚可按惟當益榮以瀉其陰乃作四神湯加荊芥穗防風不間晨夜並進明日脈漸出更服十全大補湯十劑遂痊仁齋直指云血遇熱則宣流故止血多用涼藥然亦有氣虛挾寒陰陽不相為守榮氣虛散血亦錯行所謂陽虛陰必走是耳外證必有虛冷之狀法當溫中使血自歸於經絡可用理中湯加南木香或局方七氣湯加川芎或甘草乾薑湯其效甚著又有飲食傷胃或胃虛不能傳化其氣逆上亦令吐衄木香理中湯甘草乾薑湯診脫血而脈實者難治病若吐血復鼽衄脈當沉細反浮大而牢者死吐血衄血脈滑弱小者生實大者死汗出若衄其脈滑小者生大躁者死嘔血胸滿引痛脈小而疾者逆也脈至而搏血衄身熱者死吐血咳逆上氣其脈數而有熱不得臥者死諸見血身熱脈大者難治難治者邪勝也身涼脈靜者易治易治者正氣復也衄血者若但頭汗出身無汗及汗出不至足者死血溢上行或唾或嘔或吐皆凶也若變而下行為惡利者順也血上行為逆其治難下行為順其治易故仲景云畜血證下血者當自愈若無病之人忽然下利者其病進也今病血證上行而復下行惡利者其邪欲去是知吉也鼻衄出血血衄不愈以三稜針於氣街穴出血更用五味子十粒麥門冬當歸黃耆生地人參各一錢水煎空心熱服曾病衄後血因舊路一月或三四衄又有洗面而衄日以為常此即水不通借路之意並宜止衄散茅花煎湯調下或四物湯加石菖蒲阿膠蒲黃各半錢煎熟調火煅石膏末一匙頭許兼進養正丹前諸證服藥不效大衄不止者養正丹多服仍佐以蘇子降氣湯使血隨氣下舌衄舌上忽出血如線用槐花炒研末摻以麥門冬煎湯調妙香散齒衄醫旨緒餘云有侄女十歲因毀齒動搖以苧麻摘之血出不止一日夜積十一盆用末藥止其處少頃復從口出診其脈皆洪大有力以三製大黃末二錢枳殼湯少加童便調下去黑糞數塊其血頓止一男子每齒根出血盈盆一月一發百藥不效知其人好飲投前劑一服而安一老嫗患此一發五七日日約升餘投前劑亦安所下皆有黑糞是知此疾多陽明熱盛所致緣沖任二脈皆附陽明陽明一經氣血俱多故一發如潮湧急則治其標故投以釜底抽薪之法應手而愈要知腎虛血出者其血必點滴而出齒亦攸攸而疼必不如此之暴且甚也耳衄耳中出血以龍骨吹之即止左關脈弦洪柴胡清肝散尺脈或躁或弱六味地黃丸吐血夫口鼻出血皆繫上盛下虛有升無降血隨氣上越出上竅法當順其氣氣降則血歸經矣宜蘇子降氣湯加人參阿膠各一錢下養正丹亦有氣虛不能攝血者其脈必微弱虛軟精神疲憊宜獨參湯或人參飲子團參丸上膈壅熱吐血脈洪大弦長按之有力精神不倦或覺胸中滿痛或血是紫黑塊者用生地黃赤芍當歸牡丹皮荊芥阿膠滑石大黃玄明粉桃仁泥之屬從大便導之此釜底抽薪法也血從下出者順從上出者逆一應血上溢之證苟非脾虛泄瀉羸瘦不禁者皆當以大黃醋製和生地黃汁及桃仁泥牡丹皮之屬引入血分使血下行以轉逆而為順此妙法也不知此而日從事於芩連梔檗之屬輔四物而行之使氣血俱傷脾胃兩敗今醫治血證百豈有一生者耶血既下行之後用薏苡仁多用百合麥門冬鮮地骨皮嗽渴加枇杷葉五味子桑根白皮有痰加貝母皆氣薄味淡西方兌金之本藥因其衰而減之自不再發於虛勞證為尤宜急欲止之用血餘灰二錢以白湯化阿膠二錢入童便生藕汁刺薊汁生地黃汁各一杯仍用好墨磨濃黑頓溫服吐血人多發渴名為血渴十全大補湯或黃耆人參五味子地黃麥門冬葛根枇杷葉量胃氣虛實用之咳嗽血或問咳血止從肺出他無可言耶曰肺不獨咳血而亦唾血蓋肺主氣氣逆為咳腎主水水化液為唾腎脈上入肺循喉嚨俠舌本其支者從肺出絡心注胸中故二臟相連病則俱病於是皆有咳唾血也亦有可分別者涎唾中有少血散漫者此腎從相火炎上之血也若血如紅縷在痰中咳而出者此肺絡受熱傷之血也其病難已若咳白血必死白血淺紅色似肉似肺也然肝亦唾血肝藏血肺藏氣肝血不藏亂氣自兩脅逆上唾而出之內經有血枯證先唾血為氣竭傷肝也咯血咯血不嗽而咯出血也咯與唾少異唾出於氣上無所阻咯出於痰氣鬱於喉嚨之下滯不得出咯而乃出求其所屬之臟咯唾同出於腎也治咯血之方宜用童便青黛以瀉手足少陽三焦與膽所合之相火而薑汁為佐用四物地黃牛膝輩以補腎陰安其血也攖寧生卮言云咯血為病最重且難治者以肺手太陰之經氣多血少又肺者金象為清肅之臟金為火所制迫而上行以為咯血逆之甚矣上氣見血下聞病音謂喘而咯血且咳嗽也溲血大抵溲血淋血便血三者雖以前後陰所出之竅血有不同然於受病則一也故治分標本亦一也其散血止血之藥無越於數十品之間惟引導佐使各走其鄉者少異耳先與生料五苓散和四物湯若服藥不效其人素病於色者此屬虛證宜五苓散和膠艾湯吞鹿茸丸或八味地黃丸或鹿角膠丸或辰砂妙香散和五苓散吞二項丸子若小便自清後有數點血者五苓散加赤芍藥一錢亦有如砂石而色紅卻無石淋之痛亦屬虛證宜五苓散和膠艾湯或五苓散和辰砂妙香散吞鹿茸丸八味丸鹿角膠丸下血血之在身有陰有陽陽者順氣而行循流脈中調和五臟灑陳六腑如是者謂之榮血也陰者居於絡脈專守臟腑滋養神氣濡潤筋骨若其臟感內外之邪傷則或循經之陽血至其傷處為邪氣所阻漏泄經外或居絡之陰血因著留之邪僻裂而出則皆滲入腸胃而泄矣世俗每見下血率以腸風名之不知風乃六淫中之一耳或風有從腸胃經脈而入客者或肝經風木之邪內乘於腸胃者則可謂之腸風若其他不因風邪而腸胃受火熱二淫與寒燥濕怫鬱其氣乃飲食用力過度傷其陰絡之血者亦謂之腸風可乎許學士謂下清血色鮮者腸風也血濁而色暗者臟毒也肛門射如血線者脈痔也然腸風挾濕者亦下如豆汁及紫黑瘀血不必盡鮮正當以久暫為別耳然要之皆俗名也世醫編書者或以瀉血為腸風或分瀉血與腸風臟毒為二門皆非也先血而後便此近血也由手陽明隨經下行滲入大腸傳於廣腸而下者也赤小豆當歸散主之先便而後血此遠血也由足陽明隨經入胃淫溢而下者也黃土湯主之蓄血夫人飲食起居一失其宜皆能使血瘀滯不行故百病由汙血者多而醫書分門類症有七氣而無畜血予故增著之衄血畜血上焦心下手不可近畜血中焦臍腹小腫大痛畜血下焦三焦畜血脈俱在左手中畜血上焦活人犀角地黃湯畜血中焦仲景桃仁承氣湯畜血下焦仲景抵當湯韓氏地黃湯生漆湯如牙齒等蝕數年不愈當作陽明畜血治之以桃仁承氣湯細末煉蜜丸桐子大服之好飲者多有此疾屢服有效痙痙說文強直也而無痓字廣韻痓惡也非強直明矣作痓者誤今正之金匱云病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也活人書云外證發熱惡寒與傷寒相似但其脈沉遲弦細而項背反張為異耳太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出而不惡寒名曰柔痙太陽病其證備身體強𠘧𠘧然脈反沉遲此為痙栝蔞桂枝湯主之太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之剛痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯此陽明經藥也陽明總宗筋以風寒濕熱之邪入於胃中津液不行宗筋無所養故急宜此湯下濕熱行津液故宣明云痙病目直口噤背強如弓臥搖動手足搐搦宜三一承氣湯下之亦此意也然非察證之明的有實熱者亦不可輕用也丹溪云大率與癇相似比癇為甚蓋因氣血大虛挾痰挾火而成藥宜人參竹瀝之類不可用鳳藥一男子二十餘歲患痘瘡靨謝後忽患口噤不開四肢強直不能屈時或達臍腹痛一陣則冷汗如雨痛定則汗止時作時止其脈急弦緊而急此因勞倦傷血山居多風寒乘虛而感又因痘瘡其血愈虛當用辛溫養血辛涼散風遂用當歸身芍藥為君川芎青皮鉤藤為臣白朮陳皮甘草為佐桂枝木香黃連為使更加紅花少許煎十二帖而安薛新甫云痙病因傷寒汗下過度與產婦潰瘍等病及因克伐之劑傷損氣血而變若金衰木旺先用瀉青丸後用異功散腎水虛用六味丸肝火旺先用加味小柴胡湯次用加味四物湯發熱用加味逍遙散若木侮脾土用補中益氣加芍藥山梔脾經鬱結用加味歸脾湯脾土濕熱用三一承氣湯大凡病後氣血虛弱用參術濃煎佐以薑汁竹瀝時時用之如不應用十全大補湯更不應急加附子或用參附湯緩則不救虞摶治一婦人年三十餘身形瘦弱月經後忽發痙口噤手足攣縮角弓反張此去血過多風邪乘虛而入用四物湯加防風羌活荊芥少加附子行經二帖病減半六帖病全安眩暈眩謂眼黑眩也運如運轉之運世謂之頭旋是也凡有過節即隨其所動經臟之氣而妄起因名曰厥陽之火厥陽之火有五謂之五邪五邪之變遂勝克之病作又或腎水不足或精血傷敗不能制其五陽之火獨光或中土虛衰不能提防下氣之逆則龍雷之火得以震動於巔諸火上至於頭重則搏擊為痛輕則旋轉為眩運矣或曰治諸邪當何如曰夫火因動而起但各從其所動之因而治之因實熱而動者治其熱因邪搏擊而動者治其邪因厥逆逼上者下治所厥之邪因陰虛而起者補其陰抑其陽按而收之因陽虛而氣浮上者則補其陽斂其浮游之氣因五志而動者各安其臟氣以平之因鬱而發者治其所郁之邪開之發之因精血不足者補之不已則求其屬以衰之因勝克而動者從盛衰之氣而補瀉之中氣虛衰而動者補其土以安之上焦清明之氣虛不能主持而動者亦當補中焦之穀氣推而揚之因五臟六腑上注之精氣不足而動者察其何者之虛而補之如是雖不專治其火而火自息矣凡治百病之由火而生者皆然非唯掉眩而已內經論眩皆屬肝木屬上虛丹溪論眩主於補虛治痰降火仲景治眩亦以痰飲為先也癲狂癇素問止言癲而不及癇靈樞乃有癇瘛癇厥之名諸書有言癲狂者有言癲癇者有言風癇者有言驚癇者有分癲癇為二門者迄無定論究其獨言癲者祖素問也言癲癇言癲狂者祖靈樞也要之癲癇狂大相徑庭非名殊而實一之謂也靈樞雖編癲狂為一門而形證兩具取治異途較之於癇又不侔矣徐嗣伯云大人曰癲小兒曰癇亦不然也素問謂癲為母腹中受驚所致今乃曰小兒無癲可乎癇病大人每每有之婦人尤多今據經文分辨於後癲者或狂或愚或歌或笑或悲或泣如醉如癡言語有頭無尾穢潔不知積年累月不愈俗呼心風此志願高大而不遂所欲者多有之狂者病之發時猖狂剛暴如傷寒陽明大實發狂罵詈不避親疏甚則登高而歌棄衣而走逾垣上屋非力所能或與人語所未嘗見之事如有邪依附者是也癇病發則昏不知人眩仆倒地不省高下甚而瘛瘲抽掣目上視或口眼喎斜或口作六畜之聲癲病俗謂之失心風多因抑鬱不遂侘傺無聊而成精神恍惚言語錯亂喜怒不常有狂之意不如狂之甚狂者暴病癲則久病也宜星香散加石菖蒲人參各半錢和竹瀝薑汁下壽星丸或以湧劑湧去痰涎後服寧神之劑癇病與卒中痙病相同但癇病僕時口中作聲將醒時吐涎沫醒後又復發有連日發者有一日三五發者中風中寒中暑之類則僕時無聲醒時無涎沫醒後不復再發痙病雖亦時發時止然身強直反張如弓不如癇之身軟或如豬犬牛羊之鳴也煩躁成氏曰煩為擾亂而煩躁為憤激而躁合而言之煩躁為熱也折而言之煩陽也躁陰也煩為熱之輕者躁為熱之甚者先賢治煩躁俱作有屬熱者有屬寒者治獨煩不躁者多屬熱唯悸而煩者為虛寒治獨躁不煩者多屬寒唯火邪者為熱蓋煩者心中煩胸中煩為內熱也躁者身體手足躁擾或裸體不欲近衣或欲在井中為外熱也內熱者有本之熱故多屬熱外熱者多是無根之火故屬寒也內外俱虛身體冷而汗出微嘔而煩擾手足厥逆體不得安靜者死熱病七八日其脈微細小便不利加暴口燥脈代舌焦乾黑者死大法津液去多五內枯燥而煩者八珍湯加竹葉酸棗仁麥門冬榮血不足陽勝陰微而煩者人參生地黃麥門冬地骨皮白芍藥竹茹之屬或人參養榮湯下硃砂安神丸腎水下竭心火上炎而煩者竹葉石膏湯下滋腎丸產痘滯下後虛煩為血液耗散心神不守危矣宜猛進獨參湯煩而小便不利五苓散心中蘊熱而煩清心蓮子飲煩而嘔不喜食陳皮湯驚悸恐或問驚悸怔忡恐怖之別曰悸即怔忡也怔忡者本無所驚自心動而不寧驚者因外有所觸而卒動張子和云驚者為自不知故也恐者為自知也蓋驚者聞響即驚恐者自知如人將捕之狀及不能獨自坐臥必須人為伴侶方不恐懼或夜必用燈照無燈燭亦恐懼者是也人之所主者心心之所養者血心血一虛神氣失守失守則舍空舍空而痰入客之此驚悸之所由發也或耳聞大聲目擊異物遇險臨危觸事喪志心為之忤使人有惕惕之狀是則為驚心虛而停水則胸中滲漉虛氣流動水既上乘心火惡之心不自安使人有怏怏之狀或築築然動是則為悸驚者與之豁痰定驚之劑悸者與之逐水消飲之劑所謂扶虛調養心血和平心氣而已若一切以剛燥從事或者心火自炎又有熱生風之證心膽虛怯觸事易驚或夢寐不祥遂致心驚膽懾氣鬱生涎涎與氣摶變生諸證或短氣悸乏或復自汗者並溫膽湯主之嘔則以人參代竹茹丹溪云怔忡大概屬血虛與痰有慮便動者屬虛時作時止者痰因火動瘦人多是血虛肥人多是痰飲真覺也跳者是血少宜四物安神之類久思所愛觸事不意虛耗真血心血不足遂成怔忡宜養榮湯有失志者由所求不遂或過誤自咎懼恨嗟嘆不已獨語書空若有所失宜溫膽湯去竹茹加人參柏子仁各一錢下定志丸仍佐以酒調辰砂妙香散有痞塞不飲食心中常有所歉愛處暗地或倚門後見人則驚避似失志狀此為卑惵之病以血不足故耳宜人參養榮湯脾胃不足者穀神嘉禾散加當歸黃耆各半錢健忘思慮過度病在心脾宜歸脾湯有痰加竹瀝有因精神短少者人參養榮湯小定志丸寧志膏有因痰迷心竅者導痰湯下壽星丸或加味茯苓湯心火不降腎水不升神志不定事多健忘宜朱雀丸汗凡眠熟而汗出醒則倏收者曰盜汗亦曰寢汗不分寤寐不由發表而自然汗出者曰自汗若勞後因動汗出非自汗也陰虛陽必湊故發熱自汗當歸六黃湯加地骨皮陽虛陰必乘故發厥自汗黃耆建中湯甚者加附子或耆附湯滑伯仁治一婦暑月身冷自汗口乾煩躁欲臥泥水中脈浮而數按之豁然虛散曰素問云脈至而從按之不鼓諸陽皆然此為陰盛格陽得之飲食生冷坐臥當風以真武湯冷飲之一進汗止再進躁去三進全安有痰證冷汗自出者宜七氣湯或理氣降痰湯痰去則汗自止火氣上蒸胃中之濕亦能作汗可用涼膈散有氣不順而自汗不止須理氣使榮衛調和小建中湯加木香若服諸藥欲止汗固表而並無效驗藥愈澀而汗愈不收止可理心血蓋汗乃心之液心無所養不能攝血故溢而為汗宜大補黃耆湯加酸棗仁有微熱者更加石斛兼下靈砂丹汗出如膠之黏如珠之凝及淋漓如雨揩拭不逮者難治戴復庵用黃耆建中湯加浮麥少許煎黃耆六一湯或玉屏風散補中益氣湯治內傷氣虛自汗如脈洪大心火炎上者加五味子麥門冬黃連各一錢如左關脈浮弦自汗挾風邪也加桂枝五分白芍藥一錢如一切虛損之證自汗不休者加麻黃根浮小麥虛陽甚者加附子但升麻柴胡俱用蜜水炒尺脈虛大者加炒黃檗知母熟地黃當歸六黃湯治盜汗之聖藥喑喑者邪入陰部也經云邪搏陰則為喑又云邪入於陰搏則為喑然有二證一曰舌喑乃中風舌不轉運之類是也一曰喉喑乃勞嗽失音之類是也蓋舌喑但舌本不能轉運言語而喉咽音聲則如故也喉喑但喉中聲嘶而舌本則能轉運言語也樓全善云人舌短言語不辨乃痰涎閉塞舌本之脈而然嘗治一中年男子傷寒身熱師與傷寒藥五帖日後變神昏而喑遂作體虛有痰治之人參五錢黃耆白朮當歸陳皮各一錢煎湯入竹瀝薑汁飲之十二日其舌始能語得一字又服之半月舌漸能轉運言語熱除而瘥蓋足少陰脈挾舌本脾足太陰之脈連舌本手少陰別系舌本故此三脈虛則痰涎乘虛閉塞其脈道而舌不能轉運言語也若此三脈亡血則舌無血營養而喑經云刺足少陰脈重虛出血為舌難以言又云刺舌下中脈太過血出不止為喑治當以前方加補血藥也又嘗治一男子五十餘歲嗜酒吐血桶許後不食舌不能語但渴飲水脈略數與歸芎芍地各一兩朮參各二兩陳皮一兩半甘草二錢入竹瀝童便薑汁至二十餘帖能言若此三脈風熱中之則其脈弛縱故舌亦弛縱不能轉運而喑風寒客之則其脈縮急故舌強舌卷而喑治在中風半身不收求之也樓全善治一男子四十九歲久病痰嗽忽一日感風寒食酒肉遂厥氣走喉病暴喑與灸足陽明豐隆二穴各三壯足少陰照海穴各一壯其聲立出信哉聖經之言也仍用黃芩降火為君杏仁陳皮桔梗瀉厥氣為臣訶子泄逆甘草和元氣為佐服之良愈消癉渴而多飲為上消經謂膈消消穀善肌為中消經謂消中渴而便數有膏為下消經謂腎消上消者上焦受病逆調論云心移熱於肺傳為膈消是也舌上赤裂大渴引飲少食大便如常小便清利知其燥在上焦治宜流濕潤燥以白虎加人參湯主之能食而渴為實熱人參石膏加減地骨皮散不能食而渴為虛熱白朮散門冬飲子小便不利而渴知內有熱也五苓散豬苓散泄之小便自利而渴知內有燥也甘露飲門冬飲潤之大便不利而渴止渴潤燥湯中消者胃也渴而多飲善食而瘦自汗大便硬小便頻數赤黃熱能消穀知熱在中焦也宜下之以調胃承氣湯又三黃丸主之下消者病在下焦初發為膏淋謂淋下如膏油之狀至病成煩躁引飲面色黧黑形瘦而耳焦小便濁而有脂液治宜養血以分其清濁而自愈矣以六味地黃丸主之益火之源以消陰翳則便溺有節八味丸壯水之主以制陽光則渴飲不思六味丸消渴後成水氣方書雖有紫蘇湯瞿麥湯葶藶丸皆克泄之劑不若五皮飲送濟生腎氣丸及東垣中滿分消諸方為妥診心脈微小為消癉滑甚為善渴滑者陽氣勝肺肝脾腎脈微小皆為消癉心脈軟而散者當消渴自已脈實大病久可治懸小堅病久不可治數大者生細小浮短者死黃疸大法宜利小便除濕熱脈浮腹中和宜汗脈浮心中熱腹滿欲吐者宜吐脈沉心中懊憹或熱痛腹滿小便不利而赤自汗出宜下脈不浮不沉微弦腹痛而嘔宜和解脈沉細無力身冷而黃或自汗泄利小便清白為陰黃宜溫男子黃大便自利宜補飢飽勞役內傷中州變寒病生黃非外感而得宜補治疸須分新久新病初起即當消導攻滲如茵陳五苓散胃苓飲茯苓滲濕湯之類無不效者久病又當變法也脾胃受傷日久則氣血虛弱必用補劑如參朮健脾湯當歸秦艽散使正氣盛則邪氣退庶可收功若口淡怔忡耳鳴腳軟或微寒熱小便赤白濁又當作虛治宜養榮湯或四君子湯吞八味丸五味子附子者皆可用不可過用涼劑強通小便恐腎水枯竭久而面黑黃色不可治矣然有元氣素弱避滲利之害過服滋補以致濕熱愈增者又不可拘於久病調補之例也疸病渴者難治不渴者可治脈洪大大便利而渴者死脈微小小便利不渴者生疸毒入腹喘滿者危凡年壯氣實脈來洪大者易愈年衰氣虛脈來微澀者難瘥年過五十因房勞飲酒七情不遂而得額黑嘔穢大便自利手足寒冷飲食不進肢體倦怠服建中理中滲濕諸藥不效者不可為也癘風素問脈要精微論曰脈風成為癘風論曰風寒客於脈而不去名曰癘風癘風者榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰又謂風氣與大陽俱入行諸脈俞散諸分肉之間與衛氣相干其道不利故使肌肉膹䐜而有瘍衛氣有所凝而不行故其肉有不仁也長刺節論曰大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日王注以泄衛氣之怫熱刺骨髓汗出百日王注以泄榮氣之怫熱二百日鬚眉生而止靈樞曰癘風者數刺其腫上已刺以銳針針其處按出其惡氣腫盡乃止常食方食毋食他食今觀經之論治分榮衛者如此若古方雖多但混瀉其風熱於榮衛又無先後之分至東垣丹溪始分之治法機要云先樺皮散從少至多服五七日灸承漿穴七壯灸瘡愈再灸再愈三灸之後服二聖散泄熱祛血之風邪戒房室三年病愈此先治其衛後治其榮也試效方治段庫使用補氣瀉榮湯此治榮多於治衛也丹溪云須分在上在下在上者以醉仙散取臭惡血於齒縫中出在下者以通天再造散取惡物蛔蟲於穀道中出所出雖有上下道路之異然皆不外於陽明一經而已看其疙瘩上先見在上體多者病在上也下先見在下體多者病在下也上下同得者病在上覆在下也陽明主胃與大腸無物不受此風之入人也氣受之在上多血受之在下多血氣俱受者上下皆多自非醫者神手病者鐵心罕有免者夫氣為陽為衛血為陰為榮身半已上陽先受之身半已下陰先受之是故再造散治其病在陰者用皂角刺出風毒於榮血中肝主血惡血留止其屬肝也蟲亦生於厥陰風木所化必用是治其臟氣殺蟲為主以大黃引入腸胃榮血之分利出瘀惡蟲物醉仙散治其病在陽者用鼠黏子出風毒遍身惡瘡胡麻逐風補肺潤皮膚蒺藜主惡血身體風癢通鼻氣防風治諸風栝蔞根治瘀血消熱胕腫枸杞消風熱散瘡毒蔓荊子主賊風苦參治熱毒風皮肌煩躁生瘡赤癩眉脫八味藥治功固至矣然必銀粉為使銀粉乃是下膈通大腸之要劑所以用其驅諸藥入陽明經開其風熱怫鬱痞隔逐出惡風臭穢之毒殺所生之蟲循經上行至牙齒軟薄之分而出其臭毒之涎水服此藥若有傷於齒則以黃連末揩之或先固濟以解銀粉之毒銀粉在醉仙散有奪旗斬將之功遂成此方妙用非他方可企及故丹溪取二方分用之如破敵之先鋒至於餘邪未除者但調和榮衛藥中少加驅逐劑耳薛新甫以邪之所湊其氣必虛世醫治癘止知攻邪而不知補虛非徒無益而又害之故作癘瘍機要三卷循其法雖不能去病亦可以延天年無夭枉之患破傷風夫風者百病之始也清淨則腠理閉拒雖有大風苛毒莫之能害諸瘡不瘥榮衛虛肌肉不生瘡眼不合而風邪入之為破傷風之候亦有因瘡熱鬱結多著白痂瘡口閉塞氣難宣通故熱甚而生風者先辨瘡口干無汁者中風也邊自出黃水者中水也並欲作痙急治之東垣云破傷風者通於表裡分別陰陽同傷寒證治人知有發表不知有攻裡和解夫脈浮而無力太陽也在表宜汗脈長而有力陽明也在裡宜下脈浮而弦小者少陽也半在表半在裡宜和解明此三法而治不中病者未之有也此但云三陽不及三陰者蓋風邪在三陽經便宜按法早治而愈若得傳入三陰其證已危或腹滿自利口燥嗌乾舌卷卵縮皆無生理故置而勿論也瘛瘲瘛者筋脈拘急也瘲者筋脈張縱也俗謂之搐是也原病式云諸熱瞀瘛皆屬於火熱勝風搏並於經絡風主動而不寧風火相乘是以熱瞀瘛生矣治法祛風滌熱之劑折其火熱瞀瘛可立愈若妄加灼艾或飲以發表之劑則死不旋踵矣產後瘛瘲經云肝主筋而藏血蓋肝氣為陽為火肝血為陰為水前證因產後陰血去多陽火熾盛筋無所養而然耳故癰疽膿水過多金瘡出血過甚則陽隨陰散亦多致此治法當用加味逍遙散或八珍散加丹皮鉤藤以生陰血則陽火自退諸證自愈如不應當用四君芎歸丹皮鉤藤以補脾土蓋血生於至陰至陰者脾土也故小兒吐瀉之後脾胃虧損亦多患之乃虛象也無風可逐無痰可消若屬陽氣脫陷者用補中益氣加薑桂陽氣虛敗者用十全大補加桂附亦有復生者此等證候若肢體惡寒脈微細者此為真狀若脈浮大發熱煩渴此為假象唯當固本為善無力抽搐戴眼反折汗出如珠者皆不治顫振顫搖也振動也筋脈約束不佳而莫能任持風之象也氣虛而振參朮湯補之心虛而振補心丸養之挾痰導痰湯加竹瀝老人戰振宜定振丸攣內經言攣皆屬肝肝主身之筋故也又陽明之復甚則入肝驚駭筋攣又脾移寒於肝癰腫筋攣有熱有寒有虛有實灸筋急不能行內踝筋急灸內踝四十壯外踝筋急灸外踝三十壯立愈痛痹即痛風有風有濕有痰有火有血虛有瘀血診其脈浮者風也緩細者濕也滑者痰也洪大者火也芤者血虛也澀者瘀血也因於風者加減小續命湯或烏藥順氣散去乾薑加羌活防風因於濕者遇陰雨即發身體沉重宜除濕蠲痛湯佐以竹瀝薑汁或大橘皮湯傷濕而兼感風寒者汗出身重惡風喘滿骨節煩疼狀如歷節風臍下連腳冷痹不能屈伸宜防己黃耆湯或五痹湯因痰者玉隱君豁痰湯二陳湯加薑汁竹瀝甚者控涎丹因火者潛行散加竹瀝因濕熱者二妙散因於血虛者四物蒼朮各半湯吞活血丹因瘀血者芎歸桃仁紅花水蛭入麝香少許上部痛羌活桂枝桔梗威靈仙下部痛牛膝防己木通黃檗上部腫痛五積散烏藥順氣散加薑蔥煎發其汗下部腫痛五苓八正大橘皮湯加燈心竹葉利小便若腫痛而大便不通者大柴胡湯防風通聖散主之痿痿者手足痿軟而無力百節緩縱而不收也丹溪云痿屬濕熱有濕痰者有氣虛者有血虛者有食積妨礙不降者有死血者濕熱東垣健步丸加黃檗蒼朮黃芩或清燥湯濕痰二陳加蒼朮黃檗之類入竹瀝薑汁血虛四物湯加蒼朮黃檗下補陰丸氣虛四君子湯加蒼朮黃檗氣血俱虛十全大補湯食積木香檳榔丸死血桃仁紅花蓬朮歸梢赤芍藥之類痿病食積妨礙不得降者亦有死血者俱宜下之按丹溪以難經瀉南補北之法摘為治痿之方亦是舉其例耳若胃口不開飲食少進者當以芳香辛溫之劑進之不可拘於此例宜藿香養胃湯主之況依內經當分五臟惡寒經曰惡寒戰慄皆屬於熱又曰戰慄如喪神守皆屬於火惡寒者雖當炎月若遇風霜重綿在身如覺凜凜戰慄如喪神守惡寒之甚也原病式曰病熱證而反覺自冷此為病熱實非寒也或曰往往見有服熱藥而愈者何也曰病熱之人其氣炎上郁為痰飲抑遇清道陰氣不升病熱尤甚積痰得熱亦為暫退熱勢助邪其病益深或曰寒勢如此誰敢以寒涼藥與之非殺而何曰古人遇戰慄有以大承氣湯下燥糞而愈者惡寒戰慄明是熱證但有虛實之分耳有衛氣虛衰不能實表溫分肉而惡寒者丹溪用參耆之類甚者加附子少許以行參耆之氣是也上焦不通則陽氣抑遏而皮膚分肉無以溫之故寒慄東垣升陽益胃湯用升發之劑開發上焦以伸陽明出外溫之也丹溪吐出濕痰亦開發上焦使陽氣隨吐升發出外溫之也故寒慄皆愈背惡寒是痰飲仲景云心下有留飲其人背惡寒冷如冰治法茯苓丸之類是也潮熱潮熱有作有止若潮水之來不失其時一日一發若日三五發即是發熱非潮熱也有虛有實惟傷寒日晡發熱乃胃實別無虛證其餘有潮熱者當審其虛實若大便堅澀喜冷畏熱心下愊然睡臥不著此皆氣盛所謂實而潮熱者也輕宜參蘇飲重則小柴胡湯若氣消乏精神憔悴飲食減少日漸尪羸雖病暫去而五心常有餘熱此屬虛證宜茯苓補心湯十全大補湯養榮湯之類病後欠調理者八珍散主之有潮熱似虛胸膈痞塞背心疼痛服補藥不效者此乃飲證隨氣而潮故熱隨飲而亦潮宜於痰飲門求之厥寒厥表熱裡寒下利清穀食入即吐脈沉伏手足冷四逆湯主之熱厥腹滿身重難以轉側面垢譫語遺溺厥冷自汗脈沉滑白虎湯主之熱厥手足熱而遊赤宜升陽泄火湯若大便結實大柴胡湯主之寒厥手足冷以附子理中湯指尖冷謂之清理中湯主之厥有涎潮如拽鋸聲在咽中為痰厥先用瓜蒂散或稀涎散或人參蘆煎湯探吐隨用導痰湯多加竹瀝少加薑汁暴怒氣逆而昏運者為氣厥宜八味順氣散或調氣散或四七湯手足搐搦為風厥宜小續命湯因酒而得為酒厥宜二陳湯加乾葛青皮或葛花解酲湯郁氣鬱湯治因求謀不遂或橫逆之來或貧窘所迫或暴怒所傷或悲哀所致或思念太過皆為氣鬱其狀胸滿脅痛脈沉而澀者是也香附童便浸一宿焙乾杵去毛為粗末三錢蒼朮橘紅製半夏各一錢半貝母去心白茯苓撫芎紫蘇葉自汗則用子山梔仁炒各一錢甘草木香檳榔各五分生薑五片煎如胸脅作痛此有血滯也宜參血鬱湯治之濕鬱湯治因雨露所襲或嵐氣所侵或坐臥濕地或汗出衣衫皆為濕鬱其狀身重而痛倦怠嗜臥遇陰寒則發脈沉而細緩者是也蒼朮三錢白朮香附橘紅厚朴薑汁炒半夏制白茯苓撫芎羌活獨活各一錢甘草五分生薑五片水煎血鬱湯凡七情鬱結盛怒叫呼或起居失宜或挫閃致瘀一應飢飽勞役皆能致血鬱其脈沉澀而芤其體胸脅常有痛如針刺者是也香附童便制二錢牡丹皮赤曲川通草穿山甲降真香蘇木山楂肉大麥芽炒研各一錢紅花七分水酒各一半煎去滓入桃仁去皮泥七分韭汁半盞和勻通口服熱鬱湯有陰虛而得之者有胃虛食冷物抑遏陽氣於脾土中而得之者其治法皆見發熱條中此則治夫非陰虛非陽陷亦不發熱而常自蒸蒸不解者也連翹四錢薄荷葉黃芩各一錢五分山梔仁二錢麥門冬去心三錢甘草五分鬱金一錢瓜蔞皮穰二錢竹葉七片煎問何不用蒼朮香附撫芎曰火就燥燥藥皆能助火故不用也痰鬱於痰飲門求之食鬱於傷食門求之故不著方雜類嘗治傷寒病未平復犯房室命在須臾用獨參湯調燒褌散凡服參一二斤餘得愈者三四人信哉用藥不可執一也余嘗治一刻字工人新婚冬月冒寒表證悉具令以人參紫蘇莖葉各一兩煎湯飲之汗出而愈一孕婦春夏之交患溫病頭痛發熱不惡寒而渴未及療治胎墮去血無算昏眩欲絕余令以麥門冬斤許入淡竹葉香豉頻頻飲之亦汗出而愈蓋用勞復法治之得此活法則於治是病庶幾可十全矣余每治傷寒溫熱等證為庸醫妄汗誤下已成壞病死在旦夕者以人參一二兩用童子小便煎之水浸冰冷飲之立起治傷寒黑斑曾治一人傷寒七八日因服涼藥太過遂變身涼手足厥冷通身黑斑惟心頭溫暖乃伏火也診其六脈沉細昏沉不知人事亦不能語言狀似屍厥遂用人參三白湯加熟附子半枚乾薑二錢水二鍾煎一鍾與之服下待一時許斑色漸紅手足漸暖而甦醒人參三白湯白朮白茯苓白芍藥人參生薑三片大棗二枚若脈沉足冷加附子半枚上水煎萬痘瘡主治解表和中解毒三法也解表兼發散之義使邪氣盡出於外不使留伏於中如防風白芷荊芥穗升麻葛根柴胡桂枝之屬和中專主脾胃兼助血氣使裡氣常實血氣不虧助養痘瘡而待其成不致癢塌倒陷如黃耆人參白芍藥當歸木香陳皮之屬解毒只瀉火涼血清氣使毒邪有制不為正害如山豆根大力子紫草連翹芩連梔子之屬萬世俗謂幾日發熱幾日出形幾日起發幾日作漿幾日收靨此大略之言耳痘有疏密毒有微甚人有虛實豈可一切拘以日數如瘡本疏者其毒微其人中氣實又能食自然易出易靨固不待於旬日者如瘡本密者其毒甚其人中氣實又能食榮衛調和內外無諸傷犯至十二三日可以刻期收靨也若其人中氣虛食少或內外曾有傷犯或遇氣候乖變因而難靨豈可必拘以日數哉萬不知虛實者不可以為工經曰無虛虛無實實虛實之分不可不知也經曰必先度其形之肥瘠以調其氣之虛實此以形體別虛實也又曰谷盛氣盛谷虛氣虛此以飲食別虛實也又曰脈實血實脈虛血虛此以脈別虛實也又曰邪氣盛則實精氣奪則虛此以邪正別虛實也大抵實者邪氣實也虛者正氣虛也經曰邪之所湊其氣必虛留而不去其病則實是也又曰五實死者謂邪氣之實也五虛死者謂正氣之虛也凡人診同瘡痘之證其人形體肥健飲食能多六脈洪實素無疾病大便如常瘡色紅潤者此表裡正氣俱實也不須服藥若形體羸怯素多疾病飲食減少六脈微弱吐利頻頻瘡色淡嫩者此表裡正氣俱虛也陳氏溫補之法可用如瘡勢太盛焮腫痛脹大熱不退煩渴昏睡大小便秘此表裡邪氣俱實也錢氏涼瀉之法可用如瘡本稠密焮發紅活吐利不食者此表實裡虛也於補湯中加解毒藥如瘡色淡白發不透滿大小便秘浩飲大嚼者此裡實表虛也於解利中加發藥又如瘡痛者邪氣實也當活血以開其鬱若痛如刀剜悶亂大叫者勿治瘡癢者正氣虛也當補氣以燥其濕如爬搔不定破爛皮脫者勿治灰白者氣虛也參耆之功為大乾燥者血虛也歸芎之力宜多虛則補之實則瀉之中病即已無過其制此治之權衡也若本實而反補之則毒氣彌盛或為潰爛或為癰腫或為目病或為咽瘡或為失血皆補之過也如本虛而反瀉之則正氣益虛或為吐為利為厥逆皆瀉之過也經云毋致邪毋失正絕人長命其此之謂歟凡物得其平則靜失其平則動經曰陽氣者靜則養神柔則養筋又曰陰氣者靜則神藏躁則消亡夫患痘者陰陽俱病息欲其勻語欲其少寐欲其定寤欲其寧飢則索食渴則少飲觸其瘡則吟拂其欲則鳴此平人之候神清氣定謂之靜而吉也如呻者身有苦也自語者神不清也喘粗者內熱也腸鳴者泄也坐臥不定者心煩也啼叫不止者痛也搖頭者風也指欲搔者癢也咽物難者咽痛也咬牙者心肝熱也若悶亂躁擾譫妄昏眩如見鬼狀搖頭扭項手舞足擲目睛上翻寒戰咬牙語音不出則皆死候矣如病向靜忽作擾動者異也以法求之如瘡色變無他候者此戾氣所觸也如瘡色不變又無他證此必有因但俟自定其有目瞑息微四肢僵直口噤瘡壞昏睡不醒者此真氣將脫魂魄欲離之兆又不可作靜診也或云痘瘡之候無以脈診言形色可辨也謂之形者痘之形也故尖圓堅厚始出之形發榮滋長欲壯之形飽滿充足成漿之形斂束完固收靨之形與大豆豌豆綠豆相似者皆正形也或平或陷形之變也如初出時空如蠶種之蛻隱如蚊蚤之跡薄如麩片密如針頭若熱之疿寒之慄者不能起發而死黏聚模糊肌肉虛浮溶軟嫩薄皮膚潰爛者不能收靨而死謂之色者痘之色也喜鮮明而惡昏黯喜潤澤而惡乾枯喜蒼蠟而惡嬌嫩紅不欲焰焰則易破白不欲灰灰則難靨由紅而白白而黃黃而黑者此出形起發成漿結痂之正色也出形而帶紫起發而灰白此色之變能辨痘之形色可知死生之期先賢看痘有四曰根曰窠曰腳曰地用是以驗吉凶斷死生不易之法也何謂窠中透而起頂者是也何謂根外圈而紅者是也即圈之紅否而其中之虛實與痘毒之淺深可見矣即窠之起否而根之淺深毛血之盈虧可定矣所謂腳地則本乎根窠之圓混痘子之稀密也紅暈之外謂之腳彼此顆粒界限分明不散不離者此痘腳明淨也空隙之處便謂之地彼此顆粒不相連綴者此地面明淨也根欲其活窠欲其起腳欲其固地欲其寬四者俱順痘雖密無慮矣圓者氣之形也氣盛則痘窠必圓滿周淨暈者血之形也血盛則痘窠必光明紅活氣虛則頂陷氣散則塌阻或有氣虛極而不塌陷者乃火載之雖見圓滿實空殼如泡然也血虛則暈淡血憊則暈枯根必散或有血虛極面猶紅色者乃火上浮雖見圈暈實枯槁而不潤澤也痘色之明暗繫於血氣之虛實如色之紅者痘初出也白者毒未解也黃者毒將解也干黃者毒盡解也灰白者氣衰而血不附也紫者毒盛而血滯也黑者熱極而兼水化也焦褐者氣血枯也紅變白白變黃者順而生紅變紫紫變黑者逆而死初驗之時以紅紙蘸清油燃火照之驗其生意有無又以手揩摩面頰如紅色隨手轉白隨白轉紅謂之血活生意在矣如揩之不白舉之不紅是為血枯縱疏不治又看目睛神光瞭然口唇尖上紅活如常無燥白之色發乃為吉證萬無憂也發熱輕則毒氣輕則報痘亦輕發熱重則毒氣重故報痘亦重輕者不必言治重者宜先解表涼血解毒次之及痘既出便當溫補氣血以助其成漿收靨失此不治六日之後無能為矣審之慎之庚午余自秋闈歸則亡妹已病蓋自七月乳腫痛不散八月用火針取膿醫以十全大補湯與之外敷鐵箍散不效反加喘悶九月產一女潰勢益大兩乳房爛盡延及胸腋膿水稠黏出膿幾六七升略無斂勢十一月始歸就醫醫改用解毒和中平劑外摻生肌散龍骨寒水石等劑膿出不止流濺所及即腫泡潰膿兩旁紫黑瘡口十數胸前腋下皆腫潰不可動側其勢可畏余謂產後毒氣乘虛而熾宜多服黃耆解毒補血益氣生肌而醫鑑前弊不敢用十二月中旬後益甚瘡口廿餘諸藥盡試不效始改用余藥時膿穢黏滯煎楮葉豬蹄湯沃之頓爽乃制一方名黃耆托裡湯黃耆甘溫以排膿益氣生肌為君甘草補胃氣解毒當歸身和血生血為臣升麻葛根漏蘆為足陽明本經藥及連翹防風皆散結疏經瓜蔞仁黍黏子解毒去腫皂角刺引至潰處白芷入陽明敗膿長肌又用川芎三分及肉桂炒柏為引用每劑入酒一盞煎送白玉霜丸疏膿解毒時膿水稠黏方盛未已不可遽用龍骨等藥理宜追之乃制青霞散外摻明日膿水頓稀痛定穢解始有向安之勢至辛未新正患處皆生新肉有紫腫處俱用蔥熨法隨手消散但近腋足少陽分尚未斂乃加柴胡一錢青皮三分及倍川芎膿水已盡者即用戴糝散摻之至元宵後遂全妥凡治癰疽須審經絡部分今所患正在足陽明之分少侵足少陽經分俗醫不復審別一概用藥藥無嚮導終歸罔功甚可嘆也近有患之劇甚如亡妹所苦者一庠友就余求方余以冗未及應諸瘍醫卒拱手以待斃余甚傷之議刊布其方不忍自秘也隆慶辛未九日記青霞散治癰疽潰爛膿多不斂先用楮葉豬蹄湯洗過以此敷之青黛二錢乳香一錢五分沒藥一錢五分韶粉一錢海螵蛸一錢五分枯礬一錢白蘞一錢寒水石一錢冰片三分紅粉霜另研極細和勻再研入一錢杏仁去皮尖廿四個有死肉加白丁香五分大癰疽爛甚腐多加銅綠一錢五分此方專治潰瘍因血熱肉腐化而為膿故用青黛涼血解毒而使肉無腐為君乳香沒藥活血止痛而消腫為臣寒水石之寒佐青黛以涼血肉使不腐枯礬之收澀排膿而追毒韶粉海螵蛸之收濕止膿汗之多而不燥粉霜之拔毒白蘞之斂創冰片之透肌以為佐使諸藥多燥又假杏仁之油以潤之此制方之旨也大抵治法有是病投是藥豈可狐疑而誤治哉且夾陰傷寒先因欲事伏陰於內卻又著寒內外皆陰陰氣獨盛則陽氣以衰故脈沉而足冷也必須急用人參健脈以益元氣為主佐以附子溫腎經散寒邪以退陰而回陽也若舍此二味不用將何以救之哉發熱如傷寒而其人有所從高墜下攧撲損傷或盛怒叫呼無何而病小便自利口不甚渴按心下或脅下或臍腹間有痛處或至手不可近者畜血也勞逸飢飽七情房室所傷皆能瘀血不止一途友人繆仲淳每服滋補丸藥多至數兩忽發熱不已投涼解之藥有加無損沉困之極殆將不支余用畜血法治之方烹煎次仲淳聞其氣曰一何香也飲已而熱退明日下黑糞鬥許而安拾遺編成而有遺者萃此循衣撮空摸床多是大虛之候不問雜病傷寒以大補之劑投之多有得生者大抵此證非大實即大虛當審其因察其脈參其證而分若黑白矣實而便秘大承氣瀉之虛而便滑獨參湯補之厥逆者加附子資生丸健脾開胃消食止瀉調和臟腑滋養榮衛余初識繆仲淳時見袖中出彈丸咀嚼問之曰此得之秘傳飢者服之即飽飽者食之即飢因疏其方余大善之而頗不信其消食之功已於醉飽後頓服二丸徑投枕臥夙興了無停滯始信此方之神也先恭簡年高脾弱食少痰多餘齡葆攝全賴此方因特附著於此與世共之白朮米泔水浸用山黃土拌蒸九次曬九次去土切片焙乾三兩人參去蘆人乳浸透飯鍋上蒸熟三兩白茯苓去粗皮水飛去筋膜人乳拌飯鍋上蒸曬乾一兩五錢橘紅山楂肉蒸神麯炒各二兩川黃連薑汁炒白豆蔻仁微炒澤瀉去毛炒各三錢半桔梗米泔浸炒真藿香洗甘草蜜炙去皮各五錢白扁豆炒去殼蓮肉去心各一兩薏苡仁淘淨炒三兩乾山藥炒麥芽面炒芡實淨肉炒各一兩五錢末之煉蜜丸每丸二錢重每服一丸醉飽後二丸細嚼淡薑湯下有腎氣不循故道氣逆挾脊而上致肩背作痛宜和氣飲加鹽炒小茴香半錢炒川椒十粒或看書對奕久坐而致脊背疼者補中益氣湯或八物湯加黃耆臂為風寒濕所搏或飲液流入或因提挈重物皆致臂痛有腫者有不腫者除飲證外其餘諸痛並可五積散及烏藥順氣散或蠲痹湯外有血虛不榮於筋而致臂痛宜蠲痹湯四物湯各半帖和勻煎服活血丹與四物蒼朮各半湯相表裡治遍身骨節疼痛如神金匱下利譫語者有燥屎故也小承氣湯主之仲景云下利便膿血者桃花湯主之丹溪云桃花湯主病屬下焦血虛且寒非乾薑之溫石脂之澀且重不能止血用粳米之甘引入腸胃仲景法下利清穀裡寒外熱汗出而厥者通脈四逆湯主之痢疾不納食或湯藥入口隨即吐出者俗名噤口有因邪留胃氣伏而不宣脾氣澀而不布故嘔逆而食不得入者有陽氣不足胃中宿食因之未消則噫而食卒不下者有肝乘脾胃發嘔飲食不入縱入亦反出者有水飲所停氣急而嘔谷不得入者有火氣炎熾內格嘔逆而食不得入者有胃氣虛冷食入反出者有胃中邪熱不欲食者有脾胃虛弱不欲食者有穢積在下惡氣熏蒸而嘔逆食不得入者當各從其所因以為治按卒僕暴厥之證不論男子婦人是風是寒是氣是食是痰是濕但要分得閉與脫二證明白如牙關緊閉兩手握固即是閉證宜蘇合香丸三生飲之類開之若口開手撒即是脫證宜用大劑黃耆人參煎濃湯灌之雖曰在法不治亦十救五六若誤服蘇合香丸之類即不可救矣蓋斬關奪門之藥原為閉證設若施之脫證是人既入井而又下之石也大抵驚悸健忘怔忡失志心風不寐皆是膽涎沃心以致心氣不足若用涼心之劑太過則心火愈微痰涎愈盛病愈不減惟當以理痰氣為第一義導痰湯加石菖蒲半錢膀胱者州都之官津液藏焉氣化則能出矣何謂氣化津液乃氣所化也經脈別論云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行蓋譬之蒸物然湯氣上熏釜甑遂有液而下滴此脾氣熏蒸肺葉所以遂能調水道而輸膀胱也故小便不通之症審系氣虛而水涸者利之益甚須以大劑人參少佐升麻煎湯飲之則陽升陰降是地氣上為云天氣下為雨也自然通利矣外兄賀晉卿因有不如意事又當勞役之後忽小腹急痛欲溺溺中有白物如膿並血而下莖中急痛不可忍正如滯下後重之狀日數十行更數醫不效問方於余余作汗血治之以牛膝四兩去蘆酒浸一宿長流水十二碗煎至八碗再入桃仁一兩去皮尖炒紅花二錢五分當歸梢一兩酒浸赤芍藥一兩五錢木通一兩生甘草二錢五分苧麻根二莖同煎至二碗去渣入琥珀末二錢麝香少許分作四服一日夜飲盡勢減大半按素問奇病論云病有癃者一日數十溲此不足也今瘀血雖散宜用地黃丸加菟絲子杜仲益智仁牛膝之屬補腎陰之不足以杜復至因循未及修治遂不得全愈或閉或一夜數十起溺訖痛甚逕服前丸及以補腎之藥入煎劑調理而安嘔血宜降氣不宜降火水曰潤下火曰炎上引其氣而使之下即以水剋火之理是降氣即所以降火也若用苦寒之藥以降火火萬無降理蓋炎上作苦苦先入心故芩連之苦本助火入心經之藥而名為降火者徒以其寒耳寒能凝血苦能傷胃是非但不能抑上升之氣而使之平行橫溢之血而使之歸源害且有不可勝言也可不戒哉宜行血不宜止血凡嘔血之症其始也未有不病胸脅痛者蓋由平日起居失節致血停淤之久不能歸源滿而溢焉遂發為嘔殆非一日之積矣使其流行宣暢散行百脈又何嘔血之有故凡治嘔血之症必須用行血之藥宣其餘滯而推陳以致新焉血既流行胃脘清楚自不出矣是行之乃所以止之也醫往往拘泥犀角地黃湯等過於涼血雖間或止之其後常患胸脅大痛腫滿等症以致不起蓋血得涼則陳者不行新者不生淤物愈積而真元愈削故也況血不可止而強欲止之得乎宜補肝不宜伐肝肝藏血血陰物也陰難成而易虧又肝為東方木於時為春為發生之臟宜滋養而不宜克伐先醫謂肝無補法大謬論也失血之後肝臟空虛汲汲焉實之不暇而敢以纖毫平肝之藥伐之哉往往見有治疝脹諸症謂為肝火有餘而用平肝之藥以致爪青囊縮而不起者則肝之不可伐也亦明矣噙化丸自制方清肺止嗽定喘化痰薄荷葉四兩桑白皮天門冬去心麥門冬去心知母去皮毛百部貝母去心柿霜各二兩枇杷葉去毛蜜炙訶子肉阿膠橘紅紫菀款冬花各一兩半栝蔞仁去油栝蔞皮瓤黃芩杏仁炒去皮尖油取淨霜白茯苓玄明粉鉛白霜桔梗各一兩旋覆花馬兜鈴五味子各七錢半硼砂五錢冰片一錢非真者勿用上為極細末梨膏為丸如無梨膏則以白蜜竹瀝梨汁熬至滴水不散為度丸如龍眼大噙化一丸正德六年丙申五月吉辰川勝七郎兵衛板
