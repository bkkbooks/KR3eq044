body:
  text: 卷之上中風經云暴病卒死皆屬於火注云火性速疾故也然初治之藥不寒而溫不降而升甚者從治也俗有中風中氣中食中寒中暑中濕中惡之別但見卒然仆倒昏不知人或痰涎塞壅咽喉作聲或口眼喎斜手足癱瘓或半身不遂或六脈沉伏或指下浮盛者並可用麻油薑汁竹瀝調蘇合香丸如口噤抉開灌之或用三生飲一兩加人參一兩煎成入竹瀝二三杯薑汁少許如抉不開不可進藥急以生半夏為末吹入鼻中或用細辛皂角菖蒲為末吹入得嚏則蘇此可以驗其受病深淺則知其可治不可治若口開手撒遺尿者虛極而陽暴脫也速用大料參耆接補之及臍下大艾灸之蓋心是天真神機開發之本胃是穀氣充大真氣之標標本相得則胸膈間之膻中氣海所留宗氣盈溢分布四臟三焦上中下無不周遍若標本相失則不能致其氣於氣海而宗氣散矣故分布不周於經脈則偏枯不周於五臟則喑有元氣素弱或過於勞役或傷於嗜欲而卒然厥僕狀類中風者手必散口必開非大劑參耆用至斤許豈能回元氣於無何有之鄉哉亦有不僕而但舌強語澀痰壅口眼喎斜肢體不遂者作中風治必殆以六君子湯加諸汁治之有熱盛生風而為卒僕偏枯者以麻桂烏附投之則殆當以河間法治之紺珠經云以火為本以風為標心火暴甚腎水必衰肺金既摧肝木自旺治法先以降心火為主或清心湯或瀉心湯大作劑料服之心火降則肝木自平矣次以防風通聖散汗之或大便閉塞者三化湯下之內邪已除外邪已盡當以羌活愈風湯常服之宣其氣血導其經絡病自已矣或舌蹇不語者轉舌膏或活命金丹以治之此聖人心法也或有中風便牙關緊急漿粥不入急以三一承氣湯灌於鼻中待藥下則口自開矣然後按法治之寶鑑云凡人初覺大指次指麻木不仁或不用者三年內有中風之疾也宜先服愈風湯天麻丸各一料此治未病之法也薛己云預防之理當養氣血節飲食戒七情遠幃幕可也若服前方以預防適所以招風取中也卒僕偏枯之症雖有多因未有不因真氣不周而病者故黃耆為必用之君藥防風為必用之臣藥黃耆助真氣者也防風載黃耆助真氣以周於身者也亦有治風功焉許胤宗治王太后中風口噤煎二藥熏之而愈況服之乎多怒加羚羊角渴加葛根汁秦艽口噤口喎亦加秦艽恍惚錯語加茯神遠志不得睡加炒酸棗仁不能言加竹瀝荊瀝梨汁陳醬汁生葛汁人乳汁內熱加梨汁人乳生地黃汁痰多加竹瀝荊瀝少佐以薑汁予每治此症用諸計以收奇功為其行經絡滲分肉捷於湯散故也中風將發預防之黃耆蜜炙五錢防風一錢五分人參一錢五分橘紅一錢當歸身酒洗二錢五分木通二錢五分山梔一錢甘草五分紅花三分脾胃虛弱語言無力再加人參二錢乾山藥一錢五分薏苡仁二錢白朮一錢內熱加山梔至二錢仍多啖消梨妙渴加麥門冬二錢五分五味子五分眩暈加明天麻一錢痰多而暈更加旋覆花五分腳膝麻痹無力加杜仲薑汁炒去絲牛膝酒浸石斛酒浸各一錢五分夜臥不安或多驚恐心神不寧加酸棗仁炒香熟茯神各一錢五分上用水二鍾煎至一鍾入竹瀝一杯梨汁一杯加薑汁一匙溫服無時中風將發之前未有不內熱者熱極生風子能令母實故先輩謂以火為本以風為標治法先以降心火為主心火既降肝木自平矣此實則泄其子之法也若作風治而以辛熱之藥疏之者固貽害不小而調氣一法亦百無一驗明者更精思之太平廣記載唐梁新見一朝士診之曰風痰已深請速歸去其朝士復見鄜州馬醫趙鄂乃復診之言疾危與梁說同矣曰只有一法請官人試吃消梨不限多少咀齕不及絞汁而飲到家旬日惟吃消梨頓爽矣此亦降火除熱之驗也每見時師初用八味順氣散多不得效已而用二陳四物加膽星天麻之類自謂穩當之極可以久而奏功而亦竟無一驗何也蓋妄以南星半夏為化痰之藥當歸川芎為生血之劑而泥於成方變通無法故也正不知通血脈助真元非大劑人參不可而有痰者惟宜竹瀝少加薑汁佐之不宜輕用燥劑至於歸地甘黏能滯脾氣使脾精不運何以能愈癱緩豈若人參出陽入陰少則留而多則宣無所不達哉其能通血脈雖明載本草誰信之里中一老醫右手足廢不起於床者二年矣人傳其不起過數月遇諸塗訊之曰吾之病幾危矣始服順氣行痰之藥了無應驗薄暮神志輒昏度不可支令家人煎進十全大補湯即覺清明遂日服之浹數月能扶策而起無何則又能捨策而步矣經云邪之所湊其氣必虛吾治其虛不理其邪而邪自去吾所以獲全也余曰有是哉使進順氣疏風之藥不輟者墓木拱矣然此猶拘於成方不能因病而變通隨時而消息故奏功稍遲使吾早為之當不止是也姑書之以俟明者採焉凡卒中之時不可驚惶搬攪只掐其人中徐徐以藥灌之遺尿濃煎參耆湯少加益智子頻啜之失音不語竹瀝荊瀝大梨汁各三杯生葛汁人乳汁各二杯陳醬汁半杯和勻隔湯頓溫服風邪中人六脈多沉伏亦有脈隨氣奔指下洪盛者浮遲吉堅大急疾凶浮遲為寒虛大為暑不當暑則為虛浮澀為濕浮大為風浮數無熱亦為風微而數浮而緊沉而遲皆氣中風應人迎氣應氣口洪大為火滑為痰或浮而滑沉而滑微而虛者皆虛與痰更當察時月氣候及其人之起居參以顯症而定病之主名以施治療虛勞玄珠云五行六氣水特五之一耳一水既虧豈能勝五火哉虛勞等證蜂起矣其體虛者最易感於邪氣當先和解微利微下之從其緩而治之次則調之醫者不知邪氣加於身而未除便行補劑邪氣得補遂入經絡至死不悟如此誤者何啻千萬良可悲哉夫涼劑能養水清火熱劑能燥水補火理易明也勞為熱證明矣還可補乎惟無邪無熱無積之人脈舉按無力而弱者方可補之又必察其胃中及右腎二火虧而用之心虛則動悸恍惚憂煩少色舌強宜養榮湯琥珀定神丸之類以益其心血脾虛面黃肌瘦吐利清冷腹脹腸鳴四肢無力飲食不進宜快胃湯進食丸之類以調其飲食肝虛目昏筋脈拘攣面青恐懼如人將捕之狀宜牛膝益中湯虎骨丹之類以養助其筋脈肺虛呼吸少氣喘乏咳嗽嗌乾宜枳實湯加人參黃耆阿膠蘇子以調其氣腎虛腰背膝厥逆而痛神昏耳鳴小便頻數精漏宜八味丸加五味鹿茸去附子用山藥等丸以生其精證治要訣云五勞皆因不量才力勉強云為憂思過度嗜欲無節或病失調將積久成勞其證頭旋眼暈身疼腳弱心怯氣短自汗盜汗或發寒熱或五心常熱或往來潮熱或骨蒸作熱夜多惡夢晝少精神耳內蟬鳴口中無味飲食減少此皆勞傷之證也五臟雖皆有勞心腎為多心主血腎主精精竭血燥則勞生焉治勞之法當以調心補腎為先不當用峻烈之劑惟當溫養滋補以久取效天雄附子之類投之適足以發其虛陽緣內無精血不足當此猛劑然不可因有熱純用甜冷之藥以傷其胃氣獨用熱藥者猶釜中無水而進火也過用冷藥者猶釜下無火而添水也非徒無益而又害之宜十全大補湯或雙和散或養榮湯七珍散樂令建中湯皆可選用間進雙補丸有重陰覆其陽火不得伸或洒洒惡寒或志意不樂或脈弦數四肢五心煩熱者火鬱湯柴胡升麻湯病去即已不可過劑服寒涼藥證雖大減脈反加數者陽郁也宜升宜補火忌寒涼犯之必死丹溪論勞瘵主乎陰虛者蓋自子至巳屬陽自午至亥屬陰陰虛則熱在午後子前寤屬陽寐屬陰陰虛則汗從寐時盜出也升屬陽降屬陰陰虛則氣不降氣不降則痰涎上逆而連綿吐出不絕也脈浮屬陽沉屬陰陰虛則浮之洪大沉之空虛也此皆陰虛之證用四物湯加黃柏知母主之然世醫遵用治疾乃百無一效者何哉蓋陰既虛矣火必上炎而川芎當歸皆味辛氣大溫非滋虛降火之藥又川芎上竄尤非虛炎短乏者所宜地黃泥膈非胃弱食少痰多者所宜黃柏知母苦辛大寒雖曰滋陰其實燥而損血雖曰降火其實苦先入心久而增氣反能助火至其敗胃所不待言用藥如此焉能奏功也予每用薏苡仁百合天門冬麥門冬桑根白皮地骨皮牡丹皮枇杷葉五味子酸棗仁之屬佐以生地汁藕汁乳汁童子小便等如咳嗽則多用桑皮枇杷葉有痰則增貝母有血則多用薏苡仁百合增阿膠熱盛則多用地骨皮食少則用薏苡仁至七八錢而麥門冬常為之主以保肺金而滋生化之源無不應手而效蓋諸藥皆稟燥降收之氣氣之薄者為陽中之陰氣薄則發泄辛甘淡平寒涼是也以施於陰虛火動之症猶當溽暑伊鬱之時而商飈颯然倏動則炎歊如失矣與治暑熱用白虎湯同意然彼是外感外感為有餘故用寒沉藏之藥而後能補其偏此是內傷內傷為不足但用燥降收之劑而已得其平矣此用藥之權衡也虛勞之疾百脈空虛非黏膩之物填之不能實也精血枯涸非滋濕之物濡之不能潤也宜用人參黃耆地黃天麥門冬枸杞子五味子之屬各煎膏另用青蒿以童便熬膏及生地汁白蓮藕汁人乳汁薄荷汁隔湯煉過酌定多少並麋角膠霞天膏合和成劑每用數匙湯化服之如欲行瘀血加入醋製大黃末子玄明粉桃仁泥韭汁之屬欲止血加入京墨之屬欲行痰加入竹瀝之屬欲降火加入童便之屬凡虛勞之證大抵心下引脅俱疼蓋滯血不消新血無以養之也尤宜用膏子加韭汁桃仁泥呼吸少氣懶言語無力動作目無精光面色㿠白皆兼氣虛用麥門冬人參各三錢橘紅桔梗炙甘草各半兩五味子二十一粒為極細末水浸油餅為丸如雞頭子大每服一丸細嚼津唾嚥下名補氣丸氣虛則生脈散不言白朮血虛則三才丸不言四物大略前言薏苡仁之屬治肺虛後言參耆地黃膏子之類治腎虛蓋肝心屬陽肺腎屬陰陰虛則肺腎虛矣故補肺腎即是補陰非四物黃柏知母之謂也當以脾腎二臟為要何以言之腎乃系元氣者也脾乃養形體者也經曰形不足溫之以氣者也謂真氣有少火之溫以生育形體然此火不可使之熱熱則壯壯則反耗真氣也候其火之壯少皆在兩腎間經又曰精不足補之以味五味入胃各從所喜之臟而歸之以生津液輸納於腎者若五味一有過節反成其臟有餘勝克之禍起矣候其五味之寒熱初有脾胃次在其所歸之臟即當補其不足瀉其有餘謹守精氣調其陰陽使神內藏夫如是則天樞開發而胃和脈生故榮衛以周於內外無不被滋養而病愈矣勞疾久而嗽血咽疼無聲此為自下傳上若不嗽不疼久而溺濁脫精此為自上傳下皆死證也骨蒸之極聲嗄咽痛面黧脈躁汗出如珠喘之氣促出而無入毛焦唇反皆死證也又骨肉相失聲散嘔血陽事不禁晝涼夜熱者死秘方治虛症有火服參耆則作喘嗽服歸地則少飲食服降火滋陰之藥則反削元氣而火又不降宜用此方甘枸杞石斛酒蒸多用麥門冬去心多用天門冬乾山藥以上五味皆補虛藥而帶涼者又不滯脾氣以治虛症有火者絕妙山茱萸酸棗仁炒研多用薏苡仁白茯苓若咳嗽宜用五味子十餘粒乾薑二三分薄荷四五分忌桑皮杏仁蘇子降氣等藥若發躁宜倍用收斂之藥攝火歸源忌用知母黃柏苦寒之藥犯之則躁愈甚矣發熱楊仁齋云凡壯熱煩躁用柴胡黃芩大黃解利之其熱乍輕而不退盍用黃芩川芎甘草烏梅作劑或用黃連生地黃赤茯苓同煎臨熟入燈心一捻主之其效亦速蓋川芎生地黃皆能調血心血一調其熱自退肌熱燥熱目赤面紅煩渴引飲日夜不息脈浮大而虛重按全無為血虛發熱症似白虎唯脈不長實為辨也誤服白虎必危宜當歸二錢黃耆一兩水煎服有腎虛火不歸經遊行於外而發熱者煩歇引飲面目俱赤遍舌生刺兩唇黑裂喉間如煙火上衝兩足心如烙痰涎壅盛喘急脈洪大而數無倫次按之微弱者是也宜十全大補湯吞八味丸或問燥熱如此復投桂附不為以火濟火乎曰心包絡相火附於右尺命門男子以藏精女子以系胞因嗜欲竭之而火無所附故厥而上炎桂附與火同氣也而其味辛能開腠理致津液通氣道據其窟宅而招之同氣相求火必下降矣且火從腎出者是水中之火也火可以水折而水中之火不可以水折故巴蜀有火井焉得水則熾得火則熄則桂附者固治相火之正藥歟其人脈澀必有漱水之症必有嘔惡痰涎之證必有兩腳厥冷之證亦必有小腹結急之證或唾紅或鼻衄此皆滯血作熱之明驗也用藥不止於柴胡黃芩當以川芎白芷桃仁五靈脂甘草佐之大便秘結者於中更加大黃濃蜜使滯血一通黑物流利則熱不復作仲景有三物黃芩湯治婦人四肢煩熱脈浮大而無力為虛沉細而有力為實沉細或數者死病熱有火者生心脈洪是也無火者死沉細是也浮而澀澀而身有熱者死熱而脈靜者難治脈盛汗出不解者死脈虛熱不止者死脈弱四肢厥不欲見人食不入利下不止者死不能食許學士云有人全不進食服補脾藥皆不效予授二神丸服之頓能進食此病不可全作脾氣治蓋腎氣怯弱真元衰削是以不能消化飲食譬之鼎釜之中置諸水穀下無火力終日米不熟其何能化黃魯直嘗記服菟絲子淘淨酒浸曝乾日挑數匙以酒下之十日外飲啖如湯沃雪亦知此理也今按治法虛則補其母不能食者戊己虛也火乃土之母故以破故紙補腎為癸水以肉豆蔻厚腸胃為戊土戊癸化火同為補土母之藥也楊仁齋云脾腎之氣交通則水穀自然克化瑞竹堂方謂二神丸雖兼補脾胃但無斡旋往往常加木香以順其氣使之斡旋空虛倉廩倉廩空虛則能受物屢用見效其殆使之交通之力歟嚴用和云人之有生不善攝養房勞過度真陽衰虛坎水不溫不能上蒸脾土沖和失布中州不運是致飲食不進胸膈痞塞或不食而脹滿或食而不消大腑溏泄古人云補腎不如補脾予謂補脾不如補腎腎氣若壯丹田火盛上蒸脾土脾土溫和中焦自治膈開能食矣薛新甫云予嘗病脾胃服補劑及針灸脾俞等穴不應幾殆吾鄉盧丹谷先生令予服八味丸飲食果進三料而平予兄年逾四十貌豐氣弱遇風則眩勞則口舌生瘡胸常有痰目常赤澀又一人脾虛發腫皆以八味丸而愈按此皆補腎之驗楊仁齋醫學恐當在丹溪之右有云脾腎之氣交通則水穀自然克化其見亦及此諸氣經云諸痛皆因於氣百病皆生於氣怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結九氣不同也氣無補法世俗之言也以其為病痞悶壅塞似難於補不思正氣虛者不能運行邪滯著而不出所以為病經曰壯者氣行則愈怯者著而成病苟或氣怯不用補法氣何由行氣屬陽無寒之理上升之氣覺惡寒者亢則害承乃制也氣有餘便是火冷生氣者高陽生之謬言也自覺冷氣自下而上者非真冷也蓋上升之氣自肝而出中挾相火自下而上其熱為甚火極似水陽亢陰微也按河間論氣為陽而主輕微諸所動亂勞傷乃陽火之化神狂氣亂而病熱矣又云五志過極皆為火也而其治法獨得言外之意凡見喜怒悲恐思之證皆以平心火為主至於勞者傷於動動便陽驚者駭於心心便屬火二者必以平心火為主俗醫不達此者遂有寒涼之謗脈滑者多血少氣澀者少血多氣大者血氣俱多小者血氣俱少下手脈沉便知是氣其或沉滑氣兼痰飲脈弦軟或虛大虛滑微弱飲食不節勞傷過度精神倦怠四肢困乏法當補益脈結澀或沉弦急疾收斂四肢腹脅腰胯間牽引疼痛不能轉側皆由七情鬱滯挫閃傷損謹察病原隨證疏導水腫許學士云臍腹四肢悉腫者為水但腹脹四肢不甚腫為蠱蠱即脹也然脹亦有頭面手足盡腫者大抵先頭足腫後腹大者水也先腹大後四肢腫者脹也仲景法諸有水者腰以下腫當利小便腰已上腫當發汗乃愈防己黃耆湯防己茯苓湯蒲灰散已上利小便越婢湯越婢加朮湯甘草麻黃湯麻黃附子湯杏子湯已上發汗腫病不一或遍身腫或四肢腫面腫腳腫皆謂之水氣然有陽水有陰水並可先用五皮飲或除濕湯加木瓜腹皮各半錢如未效繼以四磨飲兼吞桂黃丸仍用赤小豆粥佐之有脾肺虛弱不能通調水道者宜用補中益氣湯補脾肺六味丸補腎有心火克肺金不能生腎水以致小便不利而成水證者用人參平肺散以治肺滋陰丸以滋小便若腎經陰虧虛火爍肺金而小便不生者用六味地黃丸以補腎水用補中益氣湯以培脾土肺脾腎之氣交通則水穀自然克化二經既虛漸成水脹又誤用行氣分利之藥以致小便不利喘急痰盛已成蠱證宜加減金匱腎氣丸主之資生經云水腫惟得針水分若針餘穴水盡即死然灸水分則有效乃為要穴也有里醫與李生治水腫以藥飲之不效一日忽為灸水分與氣海穴翼早觀其面如削矣信乎水分之能治水腫也鯉魚一頭重一斤已上者煮熟取汁和冬瓜蔥白作羹食之水病脈洪大者可治微細者不可治又云浮大輕者生沉細虛小者死又云實者生虛者死脹滿仲景云脹滿按之不痛為虛痛者為實可下之腹脹時減復如故此為寒當與溫藥有因積聚相攻或疼或脹者初用七氣消聚散日久元氣虛脾胃弱而脹者參朮健脾湯少佐消導藥瘀蓄死血而脹腹皮上見青紫筋小水反利脈芤澀婦人多有此疾先以桃仁承氣湯勢重者抵當湯如虛人不可下者且以當歸活血散調治大病後飲食失調脾胃受傷運化且難而生脹者先以化滯調中湯次以參苓白朮散瀉利後並過服通利藥以致脾胃太弱而脹專以補脾為主若瀉痢未止間用胃風湯經久患泄瀉晝夜不止乃氣脫也宜用益智子煎濃湯服立愈嘉定沈氏子年十八患胸腹身面俱脹滿醫治半月不效診其脈六部皆不出也於是用紫蘇桔梗之類煎服一盞胸有微汗再服則身盡汗其六部和平之脈皆出一二日其證悉平一男子三十餘歲胸腹脹大發煩躁渴面赤不得臥而足冷予以其人素飲酒必酒後入內奪於所用精氣溢下邪氣因從之上逆則陰氣在上故為䐜脹其上焦之陽因下逆之邪所迫壅塞於上故發煩躁此因邪從上下而盛於上者也於是用吳茱萸附子人參輩以退陰逆水冷飲之以解上焦之浮熱入咽覺胸中頓爽少時腹中氣喘如牛吼泄氣五七次明日其證愈矣脹脈浮大洪實者易治沉細微弱者難治脹或兼身熱或兼如瘧狀皆不可治累驗積聚肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人嘔逆或兩脅痛牽引小腹足寒轉筋久則如瘧宜大七氣湯煎熟待冷卻以鐵器燒通紅以藥淋之乘熱服兼吞肥氣丸肺之積名曰息賁在右脅下大如覆杯氣逆背痛或少氣喜忘目瞑膚寒皮中時痛如蝨喙針刺久則咳喘宜大七氣湯加桑白皮半夏杏仁各半錢兼吞息賁丸心之積名曰伏梁起臍上大如臂上至心下久不愈令人病煩心腹熱咽乾甚則吐血宜大七氣湯加石菖蒲半夏各半錢兼吞伏梁丸脾之積名曰痞氣在胃脘大如覆杯痞塞不通背痛心疼飢減飽見腹滿吐泄久則四肢不收發黃疸飲食不為肌膚足腫肉消宜大七氣湯下紅丸子兼吞痞氣丸腎之積名曰賁豚發於少腹上至心若豚狀或下或上無時飢見飽減小腹急腰痛口乾目昏骨冷久不已令人喘逆骨痿少氣宜大七氣湯倍桂加茴香炒楝子肉各半錢兼吞奔豚丸磨積之藥必用補氣血藥相兼服之積消及半即止若純用之致死乃醫殺之也凡攻病之藥皆是傷氣損血故經曰大毒治病十去其五小毒治病十去其七不得過也治積之法理氣為先氣既升降津液流暢積聚何由而生丹溪乃謂氣無形而不能作塊成聚只一消痰破血為主誤矣夫天地間有形之物每自無中生何止積聚也戴復庵以一味大七氣湯治一切積聚其知此道歟痰飲經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行安有所謂痰者哉痰之生由於脾氣不足不能致精於肺而淤以成焉者也故治痰先補脾脾復健運之常而痰自化矣然停積既久如溝渠壅遏淹久則倒流逆上瘀濁臭穢無所不有若不疏決溝渠而欲澄治已壅之水而使之清無是理也龐安常有言人身無倒上之痰天下無逆流之水故善治痰者不治痰而治氣氣順則一身之津液亦隨氣而順矣並宜蘇子降氣湯導痰湯各半帖和煎或小半夏茯苓湯加枳實木香各半錢吞五套丸或以五套丸料依分兩作飲子煎服亦好有陰血不足陰火上逆肺受火侮不得清肅下行由是津液凝濁生痰不生血者此則當以潤劑如門冬地黃枸杞子之屬滋其陰使上逆之火得返其宅而息焉而痰自清矣投以二陳立見其殆腎虛不能納氣歸原出而不納則積積而不散則痰生焉八味丸主之脈來細滑或緩痰涎清薄身體倦怠手足痠軟此脾虛挾濕六君子湯或補中益氣加半夏茯苓脈來結澀胸膈不利或作刺痛此挾氣鬱宜七氣湯越鞠丸有人坐處率吐痰涎滿地其痰不甚稠黏只是沫多此氣虛不能攝涎不可用利藥宜六君子湯加益智仁一錢攝之丹陽賀魯庵年七十餘膈間有痰不快飲食少思初無大害就醫京口投以越鞠丸清氣化痰丸胸次稍寬日日吞之遂不輟口年餘困頓不堪僦舟來就予診治則大肉已脫兩手脈如遊絲太谿絕不至矣見予有難色因曰吾亦自分必死但膈間脹不可忍大便秘結不通誠為寬須臾即死瞑目矣固強予疏方以至親難辭教用大劑人參白朮煎湯進之少頃如廁下積痰數升胸膈寬舒更數日而歿通用海藏五飲湯局方倍術丸若乃虛症有痰勿理其痰但治其虛虛者既復則氣血健暢津液流通何痰之有今人乃謂補藥能滯氣而生痰此聾聵之言流害無窮矣咳嗽咳謂無痰而有聲肺氣傷而不清也嗽謂無聲而有痰脾濕動而為痰也咳嗽是有痰而有聲蓋因傷於肺氣而咳動於脾濕因咳而為嗽也經言臟腑皆有咳嗽咳嗽屬肺何為臟腑皆有之蓋咳嗽為病有自外而入者有自內而發者風寒暑濕外也七情飢飽內也風寒暑濕先自皮毛而入皮毛者肺之合故雖外邪欲傳臟腑亦必先從其合而為嗽此自外而入者也七情飢飽內有所傷則邪氣上逆肺為氣出入之道故五臟之邪上蒸於肺而為嗽此自內而發者也然風寒暑濕有不為嗽者蓋所感者重徑傷臟腑不留於皮毛七情亦有不為嗽者蓋病尚淺止在本臟未即上攻所以傷寒以有嗽為輕而七情飢飽之嗽久而後見治法當審脈證三因若外因邪氣止當發散又須原其虛實冷熱若內因七情則隨其部經在於氣口脈相應當以順氣為先下痰次之有停飲而咳又須消化之方不可用烏梅罌粟酸澀之藥其寒邪未除亦不可便用補藥尤忌憂思過度房室勞傷遂成瘵疾宜養脾生肺也薛新甫云春月風寒所傷咳嗽聲重頭疼用金沸草散咳嗽聲重身熱頭痛用局方消風散蓋肺主皮毛肺氣虛則腠理不密風邪易入治法當解表兼實肺氣肺有火則腠理不閉風邪外乘治宜解表兼清肺火邪退即止若數行解散則重亡津液邪蘊而為肺疽肺痿矣故凡肺受邪不能輸化而小便短少皮膚漸腫咳嗽日增者宜用六君子湯以補脾肺六味丸以滋腎水夏月喘急而嗽面赤潮熱其脈洪大者黃連解毒湯躁而咳梔子湯咳唾有血麥門冬湯俱吞六味丸壯水之主以制陽光而保肺金秋月咳而身熱自汗口乾便赤脈虛而洪者白虎湯身熱而煩氣高而短心下痞滿四肢困倦精神短少者香薷飲若病邪既去宜用補中益氣湯加乾山藥五味子以養元氣柴胡升麻各二分以升生氣冬月風寒外感形氣病氣俱實者宜華蓋散加減麻黃湯所謂從表而入自表而出若形氣病氣俱虛者宜補其元氣而佐以解表之藥若專於解表則肺氣益虛腠理益疏外邪乘虛易入而其病愈難治矣衍義云有婦人患肺熱久嗽身如炙飢瘦將成肺勞以枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黃減半各如常制治訖同為末蜜丸如櫻桃大食後夜臥各含化一丸未終劑而愈一男子五十餘歲病傷寒咳嗽喉中聲如齁與獨參湯一服而齁聲餘至二三帖咳嗽亦漸退凡服二三斤病始全愈診浮為風緊為寒數為熱細為濕浮緊則虛寒沉數則實熱弦澀則少血洪滑則多痰澀為房勞右關濡傷脾左關弦短傷肝浮短傷肺久嗽脈弱者可治實大數者死上氣喘息低昂脈滑手足溫者生脈澀四肢寒者死咳嗽羸瘦脈形堅大者死咳嗽脈沉緊者死浮直者生浮軟者生小沉伏匿者死咳而嘔腹滿泄弦急欲絕者死喘喘者促促氣急喝喝息數張口抬肩搖身擷肚短氣者呼吸雖數而不能接續似喘而不搖肩似呻吟而無痛呼吸雖急而無痰聲逆氣者但氣上而奔急肺壅而不下宜詳辨之仲景云膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐之不愈木防己湯主之虛者即愈實者三日復發與不愈者宜木防己湯去石膏加茯苓芒硝湯主之支飲不得息葶藶大棗瀉肺湯主之云岐云四七湯治痰涎咽喉中上氣喘逆甚效人參半夏丸化痰定喘樓全善云予平日用此方治久喘未發時服此丸已發時用沉香滾痰丸微下累效樓全善云凡下痰定喘諸方施之形實有痰者神效若陰虛而脈浮大按之澀者不可下下之必反劇而死初虞世云火喘用白虎湯加瓜蔞仁枳殼黃芩神效經云歲火太過炎暑流行肺金受邪民病少氣咳喘又熱淫所勝病寒熱喘咳宜以人參麥門冬五味子救肺童便炒黃柏知母降火平居則氣平和行動則氣促而喘者此衝脈之火用滋腎丸仲景云火逆上氣咽喉不利止逆下氣麥門冬湯主之東垣云肺脹膨膨而喘咳胸膈滿壅盛而上奔者予隨證用藥方中多加五味子人參次之麥門冬又次之黃連少許如甚則交兩手而瞀者真氣大虛也若氣短加黃耆五味子人參氣盛去五味子人參加黃芩荊芥穗冬月去荊芥穗加草豆蔻仁本草治咳嗽上氣喘急以人參一味為末雞子清投新水調下一錢昔有二人同走一含人參一不含俱走三五里許其不含者大喘含者氣息自如此乃人參之力也樓全善治一婦人五十餘歲素有痰嗽忽一日大喘痰出如泉身汗如油脈浮而洪似命絕之狀速用麥門冬四錢人參二錢五味子一錢五分煎服一帖喘定汗止三帖後痰亦漸少再與前方內加瓜蔞仁一錢五分白朮當歸芍藥黃芩各一錢服二十餘帖而安此實麥門冬五味子人參之功也如自汗兼腹滿脈沉實而喘者裡實也宜下之有陰虛挾痰喘者四物湯加枳殼半夏補陰降火愚謂歸地泥膈生痰枳半燥泄傷陰不如用天門冬桑皮貝母馬兜鈴地骨皮麥門冬枇杷葉之屬人參平肺散治心火刑肺傳為肺痿咳嗽喘嘔痰涎壅盛胸膈痞悶咽嗌不利參蘇溫肺湯治形寒飲冷則傷肺喘煩心胸滿短氣不能宣暢調中益氣湯加減法如秋冬月胃脈四道為衝脈所逆並脅下少陽脈二道而反上行病名曰厥逆其證氣上衝咽不得息而喘息有音不得臥加茱萸五分或一錢湯洗去苦觀厥氣多少而用之如夏月有此證為大熱也蓋此證隨四時為寒熱溫涼宜以酒黃連酒黃柏酒知母各等分為細末熟湯丸如桐子大每服二百丸白湯送下空心服仍多飲熱湯服畢少時便以美膳壓之使不得胃中停留直至下元以瀉衝脈之邪也胃絡不和喘出於陽明之氣逆陽明之氣下行今逆而上行古人以通利為戒如分氣紫蘇飲指迷七氣湯加半夏二陳湯加縮砂施之為當真元耗損喘生於腎氣之上奔真元虛憊腎氣不得歸元固有以金石鎮墜助陽接陰而愈者然亦不可峻驟且先與安腎丸八味丸輩否則人參煎湯下養正丹主之肺虛則少氣而喘經云秋脈者肺也秋脈不及則喘呼吸少氣而咳上氣見血下聞病音其治法則門冬五味人參之屬是也素問逆調論夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水藏主津液主臥與喘也東垣云病人不得眠眠則喘者水氣逆行上乘於肺肺得水而浮使氣不流通其脈沉大宜神秘湯主之素問逆調論不得臥而息有音是陽道之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也下經曰胃不和則臥不安此之謂也上氣而浮腫肩息脈浮大者危脈滑手足溫者生脈澀四脈寒者死頭痛蓋頭象天三陽六腑清陽之氣皆會於此三陰五臟精華之血亦皆注於此於是天氣所發六淫之邪人氣所變五賊之逆皆能相害或蔽覆其清陽或瘀塞其經絡因與其氣相薄鬱而成熱則脈滿滿則痛若邪氣稽留則脈亦滿而氣血亂故痛甚是痛皆為實也若寒濕所侵雖真氣虛不與相薄成熱然其邪客於脈外則血泣脈塞寒則脈縮卷緊急外引小絡而痛得溫則痛止是痛為虛也如因風木痛者則抽掣惡風或有汗而痛因暑熱痛者或有汗或無汗則皆惡熱而痛因濕而痛者則頭重而痛遇天陰尤甚因痰飲而痛者亦頭昏重而痛憒憒欲吐因寒而痛者細急惡寒而痛各與本臟所屬風寒濕熱之氣兼為之狀而痛更有氣虛而痛者遇勞則痛甚其脈大有血虛而痛者善驚惕其脈芤用是病形分之更兼所見證察之無不得之矣氣血俱虛頭痛者於調中益氣湯加川芎蔓荊子細辛其效如神當歸川芎連翹熟苄各二錢水煎去渣入龍腦薄荷末二錢乘沸泡之鼻吸其氣候溫即服服即安臥效血虛頭痛東垣選奇湯治眉骨痛不可忍效腹痛綿綿痛而無增減欲得熱手按及喜熱食其脈遲者寒也當用香砂理中湯或治中湯小建中湯五積散等藥若冷痛用溫藥不效痛愈甚大便不甚通當微利之用藿香正氣散每服加官桂木香枳殼各半錢吞下來復丹或用蘇感丸不利則量虛實用神保丸時痛時止熱手按而不散其脈洪大而數者熱也宜二陳平胃散炒芩連或四順清涼飲黃連解毒湯神芎丸金花丸之類若腹中常覺有熱而痛此為積熱宜調胃承氣湯感暑而痛或泄利並作其脈必虛豁宜十味香薷飲六和湯感濕而痛小便不利大便溏泄其脈必細宜胃苓湯痰積作痛或時眩運或嘔冷涎或下白積或小便不利或得辛辣熱湯則暫止其脈必滑宜二陳加行氣之劑及星半安中湯食積作痛痛甚欲大便利後痛減其脈必弦或沉滑宜二陳平胃加山楂神麯麥芽砂仁草果溫中丸枳朮丸保和丸木香檳榔丸之類酒積腹痛用三稜蓬朮香附官桂蒼朮厚朴陳皮甘草茯苓木香檳榔主之多年敗田螺殼煅存性加三倍於木香檳榔丸中更加山茵陳等分其效甚速氣滯作痛痛則腹脹其脈必沉宜木香順氣散死血作痛痛有常處而不移其脈必澀或芤宜桃仁承氣湯虛者加歸地蜜丸服以緩除之或用牡丹皮江西紅曲麥芽香附川通草穿山甲番降香紅花蘇木山楂玄胡索桃仁泥酒童便各一鍾煎至一鍾入韭汁服七情內結或寒氣外攻積聚堅牢如杯心腹絞痛不能飲食時發時止發即欲死宜七氣湯腹痛有作止者有塊耕起往來者吐清水者皆是蟲痛或以雞汁吞萬應丸下之或以椒湯吞烏梅丸安之脈多細小緊急滑為痰弦為食陰弦或緊或尺緊而實或伏者可下細小遲者生堅大疾者數而緊者浮大而長者死痛而喘臍下或大痛人中黑色者不治脅痛仲景云脅下偏痛發熱其脈弦緊此寒也以溫藥下之宜大黃附子湯房勞過多腎虛羸怯之人胸膈之間多有隱隱微痛此腎虛不能約氣氣虛不能生血之故氣與血猶水也盛則流暢少則壅滯故氣血不虛則不滯既虛則鮮有不滯者所以作痛宜用破故紙之類補腎當歸之類和血若作尋常脅痛治即殆矣九靈山房集云里鍾姓者一男子病脅痛眾醫以為癰也投諸香薑桂之屬益甚項彥章診其脈告曰此腎邪病法當先溫利而後竭之投神保丸下黑溲痛止即令更服神芎丸或疑其太過彥章曰向用神保丸以腎邪透膜非全蠍不能引導然巴豆性熱非得芒硝大黃盪滌之後遇熱必再作乃大泄數出病已彥章所以知男子之病者以陽脈弦陰脈微澀弦者痛也澀者腎邪有餘也腎邪上薄於脅不能下且腎方惡燥今以燥熱發之非得利不愈經曰痛隨利減殆謂此也雲中秦文山掌教平湖與家兄同官每患脅痛遇勞忍餓則發介家兄書來求方予為處以人參黃耆白朮當歸川芎地黃牛膝木瓜山茱萸石斛薏苡仁酸棗仁柏子仁桃仁之屬令常服之後來謝云自服藥後積久之疾一朝而愈不復發矣聞魏昆溟吏部亦以勞餓得脅痛無大病也而醫者投以枳殼青皮破氣之藥痛愈甚不數日而殞予故著之以為世戒腰痛有風有濕有寒有熱有挫閃有瘀血有滯氣有痰積皆標也腎虛其本也風傷腎而痛其脈必帶浮或左或右痛無常處牽引兩足宜五積散每服加防風半錢全蠍三個小續命湯獨活寄生湯皆可選用三因方小續命湯加炒去皮桃仁治風腰痛最妙仍吞三仙丹杜仲薑汁炒研末每一錢溫酒調空心服治腎氣腰痛兼治風冷為患名杜仲酒三因又有牛膝酒治腎傷風毒攻刺腰痛不可忍者傷濕而痛如坐水中蓋腎屬水久坐水濕處或為雨露所著雨水相得以致腰痛其脈必帶緩遇天陰或久坐必發身體必帶沉重宜滲濕湯主之不效宜腎著湯或生附湯風濕腰痛獨活寄生湯寒濕腰痛五積散加桃仁川芎肉桂湯麻黃蒼朮湯並摩腰膏濕熱腰痛蒼朮湯獨活湯羌活湯東垣云如身重腰沉沉然乃經中有濕熱也於羌活勝濕湯中加黃柏一錢附子五分蒼朮二錢感寒而痛者腰間如冰其脈必緊見熱則減見寒則增宜五積散去桔梗加吳茱萸半錢或姜附湯加辣桂杜仲外用摩腰膏傷熱而痛者脈必洪數而滑發渴便閉宜甘豆湯加續斷天麻間服敗毒散若因閃挫或攧撲傷損而痛者宜乳香趁痛散及黑神散和復元通氣散酒調下不效則必有惡血停滯宜先用酒調下蘇合香丸仍以五積散加桃仁大黃蘇木各一錢當歸倍原數若因勞役負重而痛宜和氣飲或普賢正氣散或十補湯下青娥丸瘀血為病其脈必澀轉側若錐刀之刺大便黑小便赤黃或黑日輕夜重名瀝血腰痛宜調榮活絡飲或桃仁酒調黑神散或四物湯加桃仁紅花之類丹溪用補陰丸中加桃仁紅花主之氣滯而痛其脈必沉宜人參順氣散或烏藥順氣散加五加皮木香入少甘草煎湯調下痰注而痛其脈必滑或伏宜二陳湯加南星香附烏藥枳殼主之大抵諸腰痛皆起腎虛既挾邪氣則須除其邪如無外邪積滯而自痛則惟補腎而已腰肢痿弱身體疲倦腳膝痠軟脈或洪或細而皆無力痛亦攸攸隱隱而不甚是其候也亦分寒熱二證脈細而無力怯怯短氣小便清利是為陽虛宜腎氣丸茴香丸鹿茸羊腎之屬或以大建中湯加川椒十粒吞下腰腎丸及生料鹿茸丸之類仍以茴香炒研末破開豬腰子作薄片勿令斷層層摻藥末水紙裹煨熟細嚼酒咽此皆所以補陽之不足也其脈洪而無力小便黃赤虛火時炎是謂陰虛東垣所謂膏粱之人久服湯藥醉以入房損其真氣則腎氣熱腎氣熱則腰脊痛而不能舉久則髓減骨枯發為骨痿宜六味丸滋腎丸封髓丹補陰丸之類以補陰之不足也楊仁齋云經云腰者腎之府轉搖不能腎將憊矣審如是則病在少陰必究其受病之源而處之為得雖然宗筋聚於陰器肝者腎之同系也五臟皆取氣於谷脾者腎之倉廩也鬱怒傷肝則諸筋縱弛憂思傷脾則胃氣不行二者又能為腰痛之寇故並及之鬱怒傷肝發為腰痛宜調肝散主之憂思傷脾發為腰痛宜沉香降氣湯和調氣散薑棗煎主之煨腎丸治肝腎損及脾損穀不化腰痛不起者神效又有沮挫失志傷腎而痛者和劑七氣湯多加白茯苓少加乳香沉香主之瘧痢後腰痛及婦人月經後腰痛俱屬虛宜補於補氣血藥中加杜仲側柏葉主之丹溪云久腰痛必用官桂開之方止腹脅痛亦然橘香丸治腰痛經久不瘥亦用官桂開之之意也心痛胃脘痛或問丹溪言心痛即胃脘痛然乎曰心與胃各一臟其病形不同因胃脘痛處在心下故有當心而痛之名豈胃脘痛即心痛者哉歷代方論將二者混同敘於一門誤自此始仲景云按之心下滿痛者此為實也當下之宜大柴胡湯凡脈堅實不大便腹滿不可按並可承氣湯下之死血作痛脈必澀作時飲湯水下或作呃壯人用桃仁承氣湯下弱人用歸尾川芎牡丹皮蘇木紅花玄胡索桂心桃仁泥赤曲番降香通草大麥芽穿山甲之屬煎成入童便酒韭汁大劑飲之或失笑散又有病人氣血虛損及素作勞羸弱之人患心痛者皆虛痛也有服大補之劑而愈者不可不知病人舊有酒積食積痰積在胃脘一遇觸犯便作疼痛挾風寒參蘇飲加薑蔥挾怒氣二陳加青皮香附薑汁炒黃連挾飲食二陳加炒山梔曲糵草果山楂挾火熱者二陳加枳實厚朴薑汁炒黃連山梔加減越鞠丸川芎蒼朮香附神麯貝母炒梔子砂仁草果參酌脈病施治耳秘傳降氣湯加石菖蒲治氣壅耳聾大有神效鼻鼻塞孫氏姑鼻塞不聞香臭有年矣後因他疾友人繆仲淳為處方每服用桑白皮至七八錢服久而鼻塞忽通鼻淵謂鼻出濁涕也樓全善治一中年男子右鼻管流濁涕有穢氣脈弦小右寸滑左寸澀先灸上星三里合谷次以酒芩二兩蒼朮半夏各一兩辛夷細辛川芎白芷石膏人參葛根各半兩分七帖服之全愈此乃濕熱痰積之證也孫一奎云嘗以防風通聖散除硝黃其滑石石膏減半倍加辛夷花先服三五帖再用此為丸每服七十丸早晚白湯吞服半斤則瘳矣鼻瘜肉韓氏醫通云貴人鼻中肉贅臭不可近痛不可搖束手待斃予但以白礬末加硇砂少許吹其上頃之化水而消與勝濕湯加瀉白散二帖愈此厚味擁濕熱蒸於肺門如雨霽之地突生芝菌也口口糜內經云膀胱移熱於小腸膈腸不便上為口糜東垣云好飲酒人多有此疾易老用五苓散導赤散相合服之神效口瘡服涼藥不愈者此酒色過度勞役不睡舌上光滑而無皮或因憂思損傷中氣虛火泛上無制用理中湯甚者加附子或官桂噙之口臭常熟嚴文靖公年逾七十未斷房室口服溫補之藥無算兼以人參煮粥蓯蓉作羹致滋胃熱滿口糜爛牙齒動搖口氣臭穢殆不可近屢進寒涼清胃之藥不效有欲用薑桂反佐者請決於予予曰用之必大劇主用加減甘露飲八劑而平齒牙痛用清涼藥便痛甚者從治之用蓽茇川椒薄荷荊芥細辛樟腦青鹽為末擦牙上牙疼以平胃散入梅花片腦少許研勻擦之立效舌曾有舌上病瘡久蝕成穴累服涼劑不效後有教服黑錫丹遂得漸愈此亦下虛故上盛也又有舌無故常自痹者不可作風治由心血不足理中湯加當歸服之咽喉急喉痹有聲如鼾有如痰在喉響者此為肺絕之候速宜參膏救之用薑汁竹瀝放開服如未得參膏或先煎獨參湯救之服早者十全七八次則十全四五遲則十不全一也針法治喉閉刺少商出血立愈孫兆治文潞公喉腫刺之嘔出膿血升餘而愈樓全善治一男子喉痹於太谿穴刺出黑血半盞而愈由是言之喉痹以惡血不散故也凡治此疾暴者必先發散發散不愈次取痰取痰不愈次去汙血也目若赤眼久而不愈用諸眼藥無效者早起以蘇子降氣湯下黑錫丹日中以酒調黑神散臨睡以消風散下三黃丸此數藥不獨治久赤諸眼疾皆治之目赤腫痛人知降火而不知活血所以不得力只用四物湯內地黃用生芍藥用赤加酒蒸大黃赤茯苓薄荷葉治之甚妙此戴復庵法許學士云素問曰久視傷血血主肝故勤書則傷肝主目昏肝傷則自生風熱氣上騰致目昏亦不可專服補藥但服益血鎮肝明目藥自愈九靈山房集云元末四明有呂復別號滄洲翁深於醫道臨川道士蕭云泉眼中視物皆倒植請治於復復問其因蕭曰某嘗大醉盡吐所飲酒熟睡至天明遂得此病復切其脈左關浮促即告之曰嘗傷酒大吐時上焦反覆致倒其膽腑故視物皆倒植此不內外因而致內傷者也法當復吐以正其膽遂以藜蘆瓜蒂為粗末用水煎之使平旦頓服以吐為度吐畢視物如常蓋目主氣血盛則玄府得利出入升降而明虛則玄府無以出入升降而昏此則必用參耆四物等劑助氣血運行而明也
